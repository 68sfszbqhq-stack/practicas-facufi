<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propuesta Planilla Campeones en Movimiento</title>
    <style>
        /* --- ESTILOS AVANZADOS PARA LA PÁGINA DE INICIO --- */

        /* --- 1. Variables de Tema y Diseño Global --- */
                :root {
            --color-fondo: #F5F7FA;
            --color-dorado-principal: #00B5E2;
            --color-dorado-secundario: #008cb0;
            --color-texto-base: #1a252f;
            --fondo-tarjeta: #ffffff;
            --radio-borde: 12px;
            --buap-navy: #003B5C;
        }

        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap');

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--color-fondo);
            color: var(--color-texto-base);
            text-align: center;
            overflow: hidden; /* Evita barras de scroll innecesarias */
        }

        /* --- 2. Contenedor Principal con Efecto de Fondo --- */
        .main-container {
            position: relative;
            z-index: 2;
            background-color: var(--fondo-tarjeta);
            padding: 50px 40px;
            border-radius: var(--radio-borde);
            box-shadow: 0 10px 40px rgba(0, 59, 92, 0.1);
            border: 1px solid rgba(0, 59, 92, 0.1);
            max-width: 700px;
            width: 90%;
        }

        #background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: linear-gradient(rgba(245, 247, 250, 0.88), rgba(245, 247, 250, 0.95)), url('bg-fcf.jpg') center/cover no-repeat fixed;
        }

        /* --- 3. Títulos y Textos --- */
        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--color-dorado-principal);
            font-size: 2.8em;
            margin: 0 0 10px 0;
            text-shadow: 1px 1px 3px rgba(0,59,92,0.1);
        }

        p {
            font-size: 1.1em;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        /* --- 4. Botones de Navegación Estilizados --- */
        .navigation-links a {
            display: block;
            background-color: transparent;
            color: var(--color-dorado-principal);
            padding: 18px 25px;
            margin: 15px 0;
            text-decoration: none;
            font-size: 1.3em;
            font-weight: 700;
            border-radius: 50px;
            border: 2px solid var(--color-dorado-principal);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        
        .navigation-links a::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background-color: var(--color-dorado-principal);
            transition: width 0.4s ease;
            z-index: -1;
        }

        .navigation-links a:hover {
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 59, 92, 0.1);
        }
        
        .navigation-links a:hover::before {
            width: 100%;
        }

    </style>
</head>
<body>

    <div id="background-animation"></div>

    <div class="main-container">
        <h1>Sistema de<br>Prácticas Curriculares</h1>
        <p>Plataforma para la Facultad de Cultura Física.</p>
        
        <div class="navigation-links">
            <a href="login.html">🔐 Portal de Alumnos y Docentes</a>
            <a href="practicas-curriculares.html">📋 Registro de Prácticas</a>
        </div>
    </div>

</body>
</html>
