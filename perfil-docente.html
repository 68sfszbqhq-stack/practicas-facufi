<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil de Docente – Prácticas Curriculares FCF</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
            :root {
      --gold: #00B5E2; --gold-dark: #008cb0; --bg: #F4F7F9;
      --surface: #FFFFFF; --surface2: #Eef2f6; --surface3: #DDE4EB;
      --text: #1a252f; --text-muted: #5e6d7d;
      --radius: 16px; --radius-sm: 10px;
      --green: #2E7D32; --orange: #E65100; --red: #C62828; --blue: #1565C0;
      --buap-navy: #003B5C;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
        .bg-canvas { position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(rgba(244, 247, 249, 0.85), rgba(244, 247, 249, 0.95)), url('bg-fcf.jpg') center/cover no-repeat fixed;
    }
    .topbar {position:sticky;top:0;z-index:100;background:rgba(13,13,13,.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,181,226,.1);padding:14px 24px;display:flex;align-items:center;justify-content:space-between; color: white; }
    .topbar-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:.88em;color:var(--gold)}
    .btn-sm{padding:7px 16px;border:1px solid rgba(0,181,226,.3);border-radius:20px;background:transparent;color:var(--buap-navy);font-family:'Montserrat',sans-serif;font-size:.75em;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
    .btn-sm:hover{border-color:var(--gold);color:var(--gold);background:rgba(0,181,226,.05)}
    main{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:32px 20px 60px}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    /* Hero */
    .hero-card{background:linear-gradient(135deg,rgba(0,181,226,.12),rgba(0,181,226,.04));border:1px solid rgba(0,181,226,.2);border-radius:var(--radius);padding:28px;display:flex;align-items:center;gap:24px;margin-bottom:20px;animation:fadeInUp .5s ease both}
    .avatar{width:84px;height:84px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2em;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 8px 32px rgba(0,181,226,.3)}
    .hero-info .small-label{font-size:.65em;text-transform:uppercase;letter-spacing:2px;color:var(--gold);font-weight:700;margin-bottom:4px}
    .hero-info h2{font-family:'Playfair Display',serif;font-size:1.4em;margin-bottom:8px}
    .pills{display:flex;flex-wrap:wrap;gap:6px}
    .pill{padding:4px 12px;border-radius:20px;font-size:.7em;font-weight:600}
    .pill-gold{background:rgba(0,181,226,.15);color:var(--gold);border:1px solid rgba(0,181,226,.25)}
    .pill-grey{background:var(--surface3);color:var(--text-muted)}
    .pill-blue{background:rgba(100,181,246,.1);color:var(--blue);border:1px solid rgba(100,181,246,.2)}
    /* Stats */
    .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;animation:fadeInUp .5s ease .1s both}
    .stat-card{background:var(--surface);border:1px solid rgba(0,59,92,.1);border-radius:var(--radius-sm);padding:16px;text-align:center;transition:all .2s}
    .stat-card:hover{border-color:rgba(0,181,226,.2);transform:translateY(-2px)}
    .stat-num{font-size:1.8em;font-weight:800;color:var(--gold);line-height:1}
    .stat-label{font-size:.65em;text-transform:uppercase;letter-spacing:1.5px;color:var(--buap-navy);font-weight:600;margin-top:5px}
    /* Tabs */
    .tab-bar{display:flex;gap:3px;background:var(--surface2);border-radius:var(--radius-sm);padding:5px;margin-bottom:20px;animation:fadeInUp .5s ease .15s both}
    .tab-btn{flex:1;padding:9px;border-radius:8px;border:none;background:transparent;color:var(--buap-navy);font-family:'Montserrat',sans-serif;font-size:.78em;font-weight:600;cursor:pointer;transition:all .2s}
    .tab-btn.active{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#000}
    /* Section card */
    .section-card{background:var(--surface);border:1px solid rgba(0,59,92,.1);border-radius:var(--radius);padding:22px;margin-bottom:18px}
    .section-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(0,59,92,.1)}
    .sh-icon{width:34px;height:34px;background:rgba(0,181,226,.1);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
    .section-header h3{font-size:.92em;font-weight:700}
    .section-header .counter{margin-left:auto;font-size:.72em;color:var(--text-muted)}
    /* Search */
    .search-inp{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid rgba(0,59,92,.1);border-radius:var(--radius-sm);color:var(--text);font-family:'Montserrat',sans-serif;font-size:.88em;margin-bottom:14px;transition:all .2s}
    .search-inp:focus{outline:none;border-color:var(--gold);background:var(--surface3)}
    .search-inp::placeholder{color:var(--text-muted)}
    /* Filter tabs */
    .filter-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
    .filter-btn{padding:6px 14px;border-radius:20px;border:1px solid rgba(0,59,92,.1);background:transparent;color:var(--buap-navy);font-family:'Montserrat',sans-serif;font-size:.72em;font-weight:600;cursor:pointer;transition:all .2s}
    .filter-btn.active,.filter-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(0,181,226,.08)}
    /* Alumno card in docente view */
    .alumno-row{background:var(--surface2);border-radius:var(--radius-sm);padding:16px;margin-bottom:10px;transition:all .2s;border:1px solid transparent}
    .alumno-row:hover{border-color:rgba(0,181,226,.15);background:var(--surface3)}
    .alumno-row-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
    .alu-avatar{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.82em;font-weight:800;color:#fff;flex-shrink:0}
    .alu-nombre{font-weight:700;font-size:.88em}
    .alu-sub{font-size:.72em;color:var(--text-muted)}
    .alu-badges{margin-left:auto;display:flex;gap:6px;align-items:center}
    .prom-chip{padding:4px 10px;border-radius:10px;font-size:.72em;font-weight:700}
    .alu-school-info{background:var(--surface);border-radius:8px;padding:12px;margin-bottom:10px}
    .asi-label{font-size:.62em;text-transform:uppercase;letter-spacing:1.5px;color:var(--buap-navy);font-weight:700;margin-bottom:4px}
    .asi-name{font-size:.85em;font-weight:700;margin-bottom:2px}
    .asi-sub{font-size:.72em;color:var(--text-muted)}
    .alu-actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn-confirm{padding:8px 18px;background:rgba(76,175,125,.15);border:1px solid rgba(76,175,125,.3);border-radius:20px;color:var(--green);font-family:'Montserrat',sans-serif;font-size:.75em;font-weight:700;cursor:pointer;transition:all .2s}
    .btn-confirm:hover{background:rgba(76,175,125,.25)}
    .btn-confirm:disabled{opacity:.4;cursor:not-allowed}
    .btn-change{padding:8px 18px;background:rgba(255,183,77,.1);border:1px solid rgba(255,183,77,.25);border-radius:20px;color:var(--orange);font-family:'Montserrat',sans-serif;font-size:.75em;font-weight:700;cursor:pointer;transition:all .2s}
    .btn-change:hover{background:rgba(255,183,77,.2)}
    .btn-pdf{padding:8px 18px;background:rgba(100,181,246,.1);border:1px solid rgba(100,181,246,.2);border-radius:20px;color:var(--blue);font-family:'Montserrat',sans-serif;font-size:.75em;font-weight:700;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
    .btn-pdf:hover{background:rgba(100,181,246,.2)}
    /* Status chips */
    .chip{padding:4px 10px;border-radius:10px;font-size:.68em;font-weight:700}
    .chip-pendiente{background:rgba(255,183,77,.12);color:var(--orange)}
    .chip-confirmada{background:rgba(76,175,125,.12);color:var(--green)}
    .chip-sin{background:var(--surface3);color:var(--text-muted)}
    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:none;align-items:center;justify-content:center}
    .modal-overlay.show{display:flex}
    .modal-box{background:var(--surface);border:1px solid rgba(0,181,226,.2);border-radius:var(--radius);padding:28px;max-width:500px;width:90%;animation:fadeInUp .3s ease}
    .modal-title{font-family:'Playfair Display',serif;font-size:1.2em;color:var(--gold);margin-bottom:4px}
    .modal-sub{font-size:.8em;color:var(--buap-navy);margin-bottom:18px}
    .modal-search{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid rgba(0,59,92,.1);border-radius:var(--radius-sm);color:var(--text);font-family:'Montserrat',sans-serif;font-size:.88em;margin-bottom:10px;transition:all .2s}
    .modal-search:focus{outline:none;border-color:var(--gold)}
    .modal-school-list{max-height:240px;overflow-y:auto;border:1px solid rgba(0,59,92,.1);border-radius:var(--radius-sm)}
    .msl-item{padding:10px 14px;border-bottom:1px solid rgba(0,59,92,.1);cursor:pointer;transition:background .15s;font-size:.83em}
    .msl-item:hover{background:rgba(0,181,226,.08)}
    .msl-item:last-child{border-bottom:none}
    .msl-item.selected{background:rgba(0,181,226,.12);font-weight:700}
    .modal-actions{display:flex;gap:10px;margin-top:16px}
    .modal-btn-ok{flex:1;padding:11px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border:none;border-radius:50px;color:#fff;font-family:'Montserrat',sans-serif;font-size:.88em;font-weight:700;cursor:pointer}
    .modal-btn-cancel{padding:11px 20px;background:transparent;border:1px solid rgba(0,59,92,.1);border-radius:50px;color:var(--buap-navy);font-family:'Montserrat',sans-serif;font-size:.88em;cursor:pointer}
    /* Empty state */
    .empty-state{text-align:center;padding:30px;color:var(--buap-navy);font-size:.85em}
    /* Table */
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:.82em}
    thead tr{border-bottom:1px solid rgba(0,181,226,.2)}
    thead th{text-align:left;padding:10px 12px;font-size:.68em;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);font-weight:700}
    tbody tr{border-bottom:1px solid rgba(0,59,92,.1);transition:background .15s}
    tbody tr:hover{background:rgba(0,59,92,.1)}
    tbody td{padding:10px 12px;vertical-align:middle}
    .badge-excelente{background:rgba(76,175,125,.15);color:var(--green);padding:3px 9px;border-radius:10px;font-size:.72em;font-weight:700}
    .badge-muy-bueno{background:rgba(100,181,246,.15);color:var(--blue);padding:3px 9px;border-radius:10px;font-size:.72em;font-weight:700}
    .badge-bueno{background:rgba(0,181,226,.15);color:var(--gold);padding:3px 9px;border-radius:10px;font-size:.72em;font-weight:700}
    .badge-regular{background:rgba(255,183,77,.15);color:var(--orange);padding:3px 9px;border-radius:10px;font-size:.72em;font-weight:700}
    .badge-suficiente{background:rgba(239,83,80,.15);color:var(--red);padding:3px 9px;border-radius:10px;font-size:.72em;font-weight:700}
    /* Switch */
    .switch{position:relative;display:inline-block;width:40px;height:22px}
    .switch input{opacity:0;width:0;height:0}
    .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#ccc;transition:.4s}
    .slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background-color:white;transition:.4s}
    input:checked+.slider{background-color:var(--green)}
    input:checked+.slider:before{transform:translateX(18px)}
    .slider.round{border-radius:34px}
    .slider.round:before{border-radius:50%}
    @media(max-width:700px){.hero-card{flex-direction:column;text-align:center}.pills{justify-content:center}.stats-bar{grid-template-columns:1fr 1fr}}
  </style>
</head>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, setDoc, updateDoc, deleteDoc }
    from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAHhDJQcaDgojC0qRXQeG3M2y55KgtBaog",
    authDomain: "sistema-de-practicas-cfbuap.firebaseapp.com",
    projectId: "sistema-de-practicas-cfbuap",
    storageBucket: "sistema-de-practicas-cfbuap.firebasestorage.app",
    messagingSenderId: "802276056298",
    appId: "1:802276056298:web:9a390b2d13825b66d60b93"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function getSolicitudes() {
    const snap = await getDocs(collection(db, 'solicitudes_practicas'));
    const arr = [];
    snap.forEach(d => arr.push({ id: d.id, ...d.data() }));
    return arr;
  }

  async function updateSolicitud(matricula, data) {
    await updateDoc(doc(db, 'solicitudes_practicas', matricula), data);
  }

  async function getAccesos() {
    const snap = await getDocs(collection(db, 'acceso_alumnos'));
    const map = {};
    snap.forEach(d => { map[d.id] = d.data()?.activo || false; });
    return map;
  }

  async function updateAcceso(matricula, activo) {
    await setDoc(doc(db, 'acceso_alumnos', matricula), { activo }, { merge: true });
  }

  async function deleteSolicitud(matricula) {
    await deleteDoc(doc(db, 'solicitudes_practicas', matricula));
  }

  window._db = db;
  window._getSolicitudes = getSolicitudes;
  window._updateSolicitud = updateSolicitud;
  window._deleteSolicitud = deleteSolicitud;
  window._getAccesos = getAccesos;
  window._updateAcceso = updateAcceso;
  window._firebaseReady = true;
  document.dispatchEvent(new Event('firebase-ready'));
</script>

<script src="data.js?v=3"></script>
<script>
  let docenteData = null;
  let todasSolicitudes = [];
  let todosAccesos = {};
  let activeTab = 'lista';
  let nrcFiltro = 'todos';
  let modalMatricula = null;
  let modalEscuelaId = null;

  function waitFirebase(cb) {
    if (window._firebaseReady) cb();
    else document.addEventListener('firebase-ready', cb, { once: true });
  }

  function init() {
    const tipo = sessionStorage.getItem('usuario_tipo');
    const raw = sessionStorage.getItem('usuario_data');
    if (tipo !== 'docente' || !raw) { window.location.href = 'login.html'; return; }
    docenteData = JSON.parse(raw);
    const full = DOCENTES.find(d => d.id === docenteData.id);
    if (full) docenteData = full;

    if (docenteData.id === 'alemarci2026') {
      docenteData.esSuperUsuario = true;
      docenteData.secciones = [];
    }

    waitFirebase(async () => {
      todasSolicitudes = await window._getSolicitudes();
      todosAccesos = await window._getAccesos();
      renderPage();
    });
  }

  function getMisAlumnos() {
    if (docenteData.esSuperUsuario) return [...ALUMNOS];
    const nrcs = docenteData.secciones.map(s => s.nrc);
    return ALUMNOS.filter(a => nrcs.includes(a.nrc));
  }

  function getMisSolicitudes() {
    if (docenteData.esSuperUsuario) return [...todasSolicitudes];
    const nrcs = docenteData.secciones.map(s => s.nrc);
    return todasSolicitudes.filter(s => nrcs.includes(s.nrc));
  }

  function renderPage() {
    const nombre = toTitleCase(docenteData.nombre.replace(' - ', ' '));
    const initials = getInitials(docenteData.nombre.replace(' - ', ' '));
    const misAlumnos = getMisAlumnos();
    const misSols = getMisSolicitudes();
    const pendientes = misSols.filter(s => s.estado === 'pendiente').length;
    const confirmadas = misSols.filter(s => s.estado === 'confirmada').length;
    const conPDF = misSols.filter(s => s.pdfUrl).length;

    document.getElementById('main-content').innerHTML = `
      <div class="hero-card">
        <div class="avatar">${initials}</div>
        <div class="hero-info">
          <p class="small-label">👨‍🏫 Docente · Primavera 2026</p>
          <h2>${nombre}</h2>
          <div class="pills">
            <span class="pill pill-gold">🆔 ${docenteData.id}</span>
            <span class="pill pill-blue">LEFS 201</span>
            <span class="pill pill-grey">${docenteData.secciones.length} sección(es)</span>
          </div>
        </div>
      </div>

      <div class="stats-bar">
        <div class="stat-card"><div class="stat-num">${misAlumnos.length}</div><div class="stat-label">Alumnos</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--orange)">${pendientes}</div><div class="stat-label">Pendientes</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--green)">${confirmadas}</div><div class="stat-label">Confirmadas</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--blue)">${conPDF}</div><div class="stat-label">Con documento</div></div>
      </div>

      <div class="tab-bar">
        <button class="tab-btn ${activeTab==='solicitudes'?'active':''}" onclick="switchTab('solicitudes')">📋 Solicitudes de Escuela</button>
        <button class="tab-btn ${activeTab==='lista'?'active':''}" onclick="switchTab('lista')">🎓 Lista de Alumnos</button>
        ${docenteData.esSuperUsuario ? `<button class="tab-btn" onclick="exportToExcel()" style="margin-left:auto; background:linear-gradient(135deg,#1e7e34,#28a745); color:#fff; border-color:#1e7e34;">📊 Exportar a Excel</button>` : ''}
      </div>

      <div id="tab-content"></div>
    `;

    renderTab();
  }

  function switchTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab-btn').forEach((b,i) => {
      b.classList.toggle('active', (i===0&&tab==='solicitudes')||(i===1&&tab==='lista'));
    });
    renderTab();
  }

  function renderTab() {
    if (activeTab === 'solicitudes') renderSolicitudesTab();
    else renderListaTab();
  }

  // ─── TAB SOLICITUDES ─────────────────────────────────
  function renderSolicitudesTab() {
    const el = document.getElementById('tab-content');
    const misAlumnos = getMisAlumnos();
    const misSols = getMisSolicitudes();

    // Ordenar alumnos por promedio (mayor prioridad primero)
    const sorted = [...misAlumnos].sort((a,b) => b.promedio - a.promedio);

    // Filtros sección
    const filterBtns = `<button class="filter-btn ${nrcFiltro==='todos'?'active':''}" onclick="setNrcFiltro('todos')">Todos</button>` +
      docenteData.secciones.map(s => `<button class="filter-btn ${nrcFiltro===String(s.nrc)?'active':''}" onclick="setNrcFiltro('${s.nrc}')">Secc. ${s.seccion}</button>`).join('');

    let html = `
      <div class="section-card">
        <div class="section-header">
          <div class="sh-icon">🏫</div>
          <h3>Solicitudes de Centro de Prácticas</h3>
          <span class="counter">Ordenados por prioridad (promedio)</span>
        </div>
        <div class="filter-tabs">${filterBtns}</div>
        <input type="text" class="search-inp" id="sol-search" placeholder="🔍 Buscar alumno por nombre o matrícula..." oninput="renderSolicitudesTab()">
    `;

    const q = document.getElementById('sol-search')?.value?.toLowerCase() || '';
    const filtered = sorted.filter(a => {
      if (nrcFiltro !== 'todos' && a.nrc !== parseInt(nrcFiltro)) return false;
      if (q && !a.nombre.toLowerCase().includes(q) && !a.matricula.includes(q)) return false;
      return true;
    });

    // Ranking global
    const globalSorted = [...ALUMNOS].sort((a,b) => b.promedio - a.promedio);

    if (filtered.length === 0) {
      html += `<div class="empty-state">No se encontraron alumnos</div>`;
    } else {
      filtered.forEach(alumno => {
        const sol = misSols.find(s => s.matricula === alumno.matricula);
        const badge = getPromedioBadge(alumno.promedio);
        const rankG = globalSorted.findIndex(a => a.matricula === alumno.matricula) + 1;
        const initials = getInitials(alumno.nombre);

        let schoolBlock = '';
        if (sol) {
          const esc = ESCUELAS.find(e => e.id === sol.escuelaId);
          const isConf = sol.estado === 'confirmada';
          schoolBlock = `
            <div class="alu-school-info">
              <div class="asi-label">Escuela solicitada</div>
              <div class="asi-name">${esc ? toTitleCase(esc.nombre) : sol.escuelaNombre} <span style="font-size:.7em;color:var(--gold);border:1px solid var(--gold);padding:2px 6px;border-radius:10px;margin-left:4px;display:${!esc?'inline-block':'none'}">EXTEMPORÁNEO</span></div>
              <div class="asi-sub">${esc ? '📍 ' + esc.direccion + '<br>🌎 ' + esc.municipio + ' (' + esc.localidad + ')<br>🏷️ CCT: ' + esc.cct + ' | Zona: ' + esc.zona + ' | Tipo: ' + esc.tipo + '<br>🕒 Turno: ' + esc.turno : '🌎 ' + (sol.escuelaMunicipio || 'No especificado')}</div>
            </div>
            
            <div class="alu-actions" style="display:flex; flex-direction:column; gap:8px;">
              <div style="font-size:0.8em; color:var(--buap-navy); background:rgba(0,181,226,0.05); padding:8px; border-radius:4px; border:1px solid rgba(0,181,226,0.2);">
                <strong>Datos del alumno:</strong><br>
                📧 ${sol.email || 'Sin correo asignado'}<br>
                📞 ${sol.telefono || 'Sin teléfono asignado'}
              </div>
              <div style="font-size:0.8em; padding:8px; background:rgba(0,0,0,0.02); border-radius:4px; border:1px solid rgba(0,0,0,0.05);">
                <strong>Documentos Recibidos:</strong><br>
                ${sol.ineUrl ? `<a href="${sol.ineUrl}" target="_blank" style="margin-right:8px; text-decoration:none;">✅ INE</a>` : '<span style="color:#ccc; margin-right:8px; text-decoration:line-through;">INE</span>'}
                ${sol.cartaUrl ? `<a href="${sol.cartaUrl}" target="_blank" style="margin-right:8px; text-decoration:none;">✅ CARTA</a>` : '<span style="color:#ccc; margin-right:8px; text-decoration:line-through;">CARTA</span>'}
                ${sol.oficioUrl ? `<a href="${sol.oficioUrl}" target="_blank" style="margin-right:8px; text-decoration:none;">✅ OFICIO</a>` : '<span style="color:#ccc; margin-right:8px; text-decoration:line-through;">OFICIO</span>'}
                ${sol.acuerdosUrl ? `<a href="${sol.acuerdosUrl}" target="_blank" style="margin-right:8px; text-decoration:none;">✅ ACUERDOS</a>` : '<span style="color:#ccc; margin-right:8px; text-decoration:line-through;">ACUERDOS</span>'}<br>
                ${sol.bitacoraUrl ? `<a href="${sol.bitacoraUrl}" target="_blank" style="margin-right:8px; text-decoration:none;">✅ BITÁCORA</a>` : '<span style="color:#ccc; margin-right:8px; text-decoration:line-through;">BITÁCORA</span>'}
                ${sol.desempenoUrl ? `<a href="${sol.desempenoUrl}" target="_blank" style="margin-right:8px; text-decoration:none;">✅ DESEMPEÑO</a>` : '<span style="color:#ccc; margin-right:8px; text-decoration:line-through;">DESEMPEÑO</span>'}
                ${sol.liberacionUrl ? `<a href="${sol.liberacionUrl}" target="_blank" style="margin-right:8px; text-decoration:none;">✅ LIBERACIÓN</a>` : '<span style="color:#ccc; margin-right:8px; text-decoration:line-through;">LIBERACIÓN</span>'}
              </div>
              <div style="display:flex; gap:10px; margin-top:4px;">
                <button class="btn-confirm" onclick="confirmarEscuela('${alumno.matricula}')" ${isConf?'disabled':''}>
                  ${isConf ? '✅ Confirmada' : '✅ Confirmar escuela'}
                </button>
                <button class="btn-change" onclick="openModal('${alumno.matricula}','${alumno.nombre}')">🔄 Cambiar escuela</button>
                ${docenteData.esSuperUsuario ? `<button class="btn-change" style="background:#fff0f0; color:#e53935; border-color:#ffcdd2;" onclick="resetAlumno('${alumno.matricula}')">🗑️ Resetear</button>` : ''}
              </div>
            </div>`;
        } else {
          schoolBlock = `<div style="font-size:.8em;color:var(--buap-navy);padding:8px 0;font-style:italic">Este alumno aún no ha solicitado escuela.</div>`;
        }

        html += `
          <div class="alumno-row">
            <div class="alumno-row-top">
              <div class="alu-avatar">${initials}</div>
              <div class="alu-meta">
                <div class="alu-nombre">${toTitleCase(alumno.nombre)}</div>
                <div class="alu-sub">Matrícula ${alumno.matricula} · Prioridad #${rankG} global</div>
              </div>
              <div class="alu-badges">
                <span class="prom-chip ${badge.class.replace('badge-','badge-')}">${(alumno.promedio || 0).toFixed(2)}</span>
                <span class="chip ${sol?(sol.estado==='confirmada'?'chip-confirmada':'chip-pendiente'):'chip-sin'}">${sol?(sol.estado==='confirmada'?'Confirmada':'Pendiente'):'Sin solicitud'}</span>
              </div>
            </div>
            ${schoolBlock}
          </div>`;
      });
    }

    html += `</div>`;
    el.innerHTML = html;

    // Restore search focus
    const inp = document.getElementById('sol-search');
    if (inp) { const v = q; inp.value = v; }
  }

  function setNrcFiltro(nrc) {
    nrcFiltro = nrc;
    renderSolicitudesTab();
  }

  // ─── TAB LISTA ─────────────────────────────────────────
  function renderListaTab() {
    const el = document.getElementById('tab-content');
    const misAlumnos = getMisAlumnos();
    const sorted = [...misAlumnos].sort((a,b) => b.promedio - a.promedio);

    const filterBtns = `<button class="filter-btn ${nrcFiltro==='todos'?'active':''}" onclick="setNrcFiltroLista('todos')">Todos (${misAlumnos.length})</button>` +
      (docenteData.esSuperUsuario ? '' : docenteData.secciones.map(s => {
        const cnt = misAlumnos.filter(a=>a.nrc===s.nrc).length;
        return `<button class="filter-btn ${nrcFiltro===String(s.nrc)?'active':''}" onclick="setNrcFiltroLista('${s.nrc}')">Secc. ${s.seccion} (${cnt})</button>`;
      }).join(''));

    const q = document.getElementById('lista-search')?.value?.toLowerCase() || '';
    const filtered = sorted.filter(a => {
      if (nrcFiltro !== 'todos' && a.nrc !== parseInt(nrcFiltro)) return false;
      if (q && !a.nombre.toLowerCase().includes(q) && !a.matricula.includes(q)) return false;
      return true;
    });

    let html = `
      <div class="section-card">
        <div class="section-header">
          <div class="sh-icon">🎓</div>
          <h3>Lista de Alumnos</h3>
          <span class="counter">Ordenados por promedio</span>
        </div>
        <div class="filter-tabs">${filterBtns}</div>
        <input type="text" class="search-inp" id="lista-search" placeholder="🔍 Buscar..." oninput="renderListaTab()">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>#</th><th>Nombre</th><th>Matrícula</th>
              ${docenteData.esSuperUsuario ? '<th>Contacto</th>' : ''}
              ${docenteData.esSuperUsuario ? '<th>Cita</th><th>Acceso</th>' : '<th>Promedio</th><th>Nivel</th>'}
              <th>Escuela (Estado)</th>
              ${docenteData.esSuperUsuario ? '<th style="min-width:180px">Documentos (PDF)</th>' : ''}
            </tr></thead>
            <tbody>`;

    if (filtered.length === 0) {
      html += `<tr><td colspan="6"><div class="empty-state">No se encontraron alumnos</div></td></tr>`;
    } else {
      filtered.forEach((a,i) => {
        const badge = getPromedioBadge(a.promedio);
        const sol = todasSolicitudes.find(s => s.matricula === a.matricula);
        const esc = sol ? ESCUELAS.find(e=>e.id===sol.escuelaId) : null;
        const isExt = sol && !esc;
        const escNombre = sol ? toTitleCase(esc ? esc.nombre : sol.escuelaNombre) + (isExt ? ' [EXT]' : '') : '—';
        const escStatus = sol ? `<span class="chip ${sol.estado==='confirmada'?'chip-confirmada':'chip-pendiente'}">${sol.estado==='confirmada'?'✅':' ⏳'} ${escNombre}</span>` : `<span style="font-size:.75em;color:var(--text-muted)">Sin solicitud</span>`;
        
        const contactStr = sol ? `<div style="font-size:0.75em"><a href="mailto:${sol.email}" style="color:var(--blue)">${sol.email || '—'}</a><br>${sol.telefono || '—'}</div>` : '<div style="font-size:0.7em;color:#999">—</div>';

        const dl = (url, lbl) => url ? `<a href="${url}" target="_blank" style="margin-right:2px; font-size:0.75em; color:var(--green); text-decoration:none;" title="${lbl}">✅${lbl}</a>` : `<span style="margin-right:2px; font-size:0.75em; color:#ccc; text-decoration:line-through" title="Falta ${lbl}">❌${lbl}</span>`;

        const docsStr = sol ? `
           ${dl(sol.ineUrl, 'INE')} ${dl(sol.cartaUrl, 'CARTA')}<br>
           ${dl(sol.oficioUrl, 'OFICIO')} ${dl(sol.acuerdosUrl, 'ACUERD')}<br>
           ${dl(sol.bitacoraUrl, 'BITAC')} ${dl(sol.desempenoUrl, 'DESEMP')}<br>
           ${dl(sol.liberacionUrl, 'LIBER')}
        ` : '<span style="font-size:0.7em;color:#999">—</span>';

        html += `<tr>
          <td style="color:var(--buap-navy);font-size:.8em;font-weight:600">#${i+1}</td>
          <td style="font-weight:600;font-size:.85em">${toTitleCase(a.nombre)}</td>
          <td style="font-size:.8em;color:var(--buap-navy);font-family:monospace">${a.matricula}</td>
          ${docenteData.esSuperUsuario ? `<td>${contactStr}</td>` : ''}
          ${docenteData.esSuperUsuario ? `<td style="font-size:.8em;font-weight:700;color:var(--gold)">${a.horarioCita || '12:00'}</td>` : `<td style="font-weight:700">${(a.promedio || 0).toFixed(2)}</td>`}
          ${docenteData.esSuperUsuario ? 
              `<td>
                  <label class="switch">
                    <input type="checkbox" onchange="toggleAccesoAlumno('${a.matricula}', this.checked)" ${todosAccesos[a.matricula] ? 'checked' : ''}>
                    <span class="slider round"></span>
                  </label>
               </td>` 
            : `<td><span class="${badge.class}">${badge.label}</span></td>`}
          <td>
            ${escStatus}
            ${docenteData.esSuperUsuario && sol ? `<br><button onclick="resetAlumno('${a.matricula}')" style="margin-top:6px; background:none; border:none; color:#e53935; text-decoration:underline; font-size:0.75em; cursor:pointer;" title="Borrar toda la información del alumno">🗑️ Resetear Alumno</button>` : ''}
          </td>
          ${docenteData.esSuperUsuario ? `<td>${docsStr}</td>` : ''}
        </tr>`;
      });
    }

    html += `</tbody></table></div></div>`;
    el.innerHTML = html;
    const inp = document.getElementById('lista-search');
    if (inp) inp.value = q;
  }

  function setNrcFiltroLista(nrc) {
    nrcFiltro = nrc;
    renderListaTab();
  }

  // ─── CONFIRMAR ESCUELA ──────────────────────────────────
  async function confirmarEscuela(matricula) {
    try {
      await window._updateSolicitud(matricula, { estado: 'confirmada', fechaConfirmacion: new Date().toISOString(), confirmadoPor: docenteData.id });
      todasSolicitudes = await window._getSolicitudes();
      renderTab();
    } catch(e) { alert('Error al confirmar. Intenta de nuevo.'); }
  }

  async function resetAlumno(matricula) {
    if (!confirm('¿Estás SEGURO de querer resetear a este alumno? Se borrarán todos sus datos y documentos de la base de datos y tendrá que volver a empezar.')) return;
    try {
      await window._deleteSolicitud(matricula);
      todasSolicitudes = await window._getSolicitudes();
      renderTab();
      alert('Alumno reseteado correctamente.');
    } catch(e) {
      alert('Error al resetear: ' + e.message);
    }
  }

  function exportToExcel() {
    const rows = [];
    // Header row
    rows.push([
      'No.', 'Matrícula', 'Nombre', 'Promedio', 'Bloque', 'Prioridad Global',
      'NRC', 'Sección', 'Docente', 'Horario Cita',
      'Correo', 'Teléfono',
      'Estado Solicitud', 'Escuela Asignada', 'CCT', 'Municipio', 'Dirección Completa', 'Zona', 'Tipo', 'Turno',
      'INE', 'Carta Aceptación', 'Oficio Asignación', 'Acuerdos', 'Bitácora', 'Hoja Desempeño', 'Oficio Liberación'
    ]);

    const sorted = [...ALUMNOS].sort((a,b) => b.promedio - a.promedio);
    sorted.forEach((a, index) => {
      const badge = getPromedioBadge(a.promedio);
      const sol = todasSolicitudes.find(s => s.matricula === a.matricula);
      const esc = sol ? ESCUELAS.find(e => e.id === sol.escuelaId) : null;
      const docente = DOCENTES.find(d => d.secciones.some(s => s.nrc === a.nrc));
      const seccion = docente ? docente.secciones.find(s => s.nrc === a.nrc) : null;

      rows.push([
        index + 1,
        a.matricula,
        a.nombre,
        a.promedio.toFixed(2),
        badge.label,
        index + 1,
        a.nrc || '',
        seccion ? seccion.seccion : '',
        docente ? docente.nombre : '',
        a.horarioCita || '',
        sol ? (sol.email || '') : '',
        sol ? (sol.telefono || '') : '',
        sol ? sol.estado : 'Sin solicitud',
        sol ? (esc ? esc.nombre : sol.escuelaNombre) : '',
        sol ? (esc ? esc.cct : sol.escuelaCCT || '') : '',
        sol ? (esc ? esc.municipio : sol.escuelaMunicipio || '') : '',
        sol ? (sol.escuelaUbicacion || (esc ? [esc.direccion, esc.localidad, esc.municipio].filter(Boolean).join(', ') : '')) : '',
        esc ? esc.zona : '',
        esc ? esc.tipo : '',
        esc ? esc.turno : '',
        sol && sol.ineUrl ? sol.ineUrl : 'NO',
        sol && sol.cartaUrl ? sol.cartaUrl : 'NO',
        sol && sol.oficioUrl ? sol.oficioUrl : 'NO',
        sol && sol.acuerdosUrl ? sol.acuerdosUrl : 'NO',
        sol && sol.bitacoraUrl ? sol.bitacoraUrl : 'NO',
        sol && sol.desempenoUrl ? sol.desempenoUrl : 'NO',
        sol && sol.liberacionUrl ? sol.liberacionUrl : 'NO',
      ]);
    });

    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(rows);

    // Auto-width columns
    const colWidths = rows[0].map((_, colIdx) => ({
      wch: Math.max(...rows.map(r => String(r[colIdx] || '').length), 10)
    }));
    ws['!cols'] = colWidths;

    XLSX.utils.book_append_sheet(wb, ws, 'Alumnos Prácticas 2026');
    const fecha = new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb, `Reporte_Practicas_FCF_${fecha}.xlsx`);
  }

  // ─── MODAL REASIGNACIÓN ──────────────────────────────────
  function openModal(matricula, nombreAlumno) {
    modalMatricula = matricula;
    modalEscuelaId = null;
    document.getElementById('modal-title').textContent = 'Reasignar escuela';
    document.getElementById('modal-sub').textContent = toTitleCase(nombreAlumno);
    document.getElementById('modal-search').value = '';
    document.getElementById('modal-btn-ok').disabled = true;
    buildModalList('');
    document.getElementById('modal-overlay').classList.add('show');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('show');
    modalMatricula = null; modalEscuelaId = null;
  }

  function buildModalList(q) {
    const tomadas = new Set(todasSolicitudes.filter(s=>s.matricula!==modalMatricula).map(s=>s.escuelaId));
    const el = document.getElementById('modal-school-list');
    const filtered = ESCUELAS.filter(e => !q || e.nombre.toLowerCase().includes(q) || e.municipio.toLowerCase().includes(q));
    el.innerHTML = filtered.map(e => {
      const taken = tomadas.has(e.id);
      return `<div class="msl-item${modalEscuelaId===e.id?' selected':''}" onclick="selectModalSchool(${e.id})">
        <strong>${toTitleCase(e.nombre)}</strong>${taken?' <span style="color:var(--orange);font-size:.75em">⚠ Ya asignada</span>':''}
        <div style="font-size:.75em;color:var(--text-muted)">${e.municipio} (${e.localidad}) · CCT: ${e.cct}<br>Zona: ${e.zona} | Turno: ${e.turno}</div>
      </div>`;
    }).join('') || '<div class="empty-state">Sin resultados</div>';
  }

  function filterModalSchools() {
    buildModalList(document.getElementById('modal-search').value.toLowerCase());
  }

  function selectModalSchool(id) {
    modalEscuelaId = id;
    document.getElementById('modal-btn-ok').disabled = false;
    buildModalList(document.getElementById('modal-search').value.toLowerCase());
  }

  async function confirmarReasignacion() {
    if (!modalMatricula || !modalEscuelaId) return;
    const esc = ESCUELAS.find(e => e.id === modalEscuelaId);
    try {
      await window._updateSolicitud(modalMatricula, {
        escuelaId: esc.id, escuelaNombre: esc.nombre, escuelaCCT: esc.cct, escuelaMunicipio: esc.municipio,
        estado: 'confirmada', reasignadoPor: docenteData.id, fechaConfirmacion: new Date().toISOString()
      });
      todasSolicitudes = await window._getSolicitudes();
      closeModal();
      renderTab();
    } catch(e) { alert('Error al reasignar. Intenta de nuevo.'); }
  }

  // Expose
  window.switchTab = switchTab;
  window.setNrcFiltro = setNrcFiltro;
  window.setNrcFiltroLista = setNrcFiltroLista;
  window.confirmarEscuela = confirmarEscuela;
  window.openModal = openModal;
  window.closeModal = closeModal;
  window.filterModalSchools = filterModalSchools;
  window.selectModalSchool = selectModalSchool;
  window.confirmarReasignacion = confirmarReasignacion;
  window.renderSolicitudesTab = renderSolicitudesTab;
  window.renderListaTab = renderListaTab;
  
  window.toggleAccesoAlumno = async function(matricula, activo) {
      todosAccesos[matricula] = activo;
      try {
          await window._updateAcceso(matricula, activo);
      } catch(e) {
          alert('Error al actualizar acceso');
          todosAccesos[matricula] = !activo;
          renderListaTab();
      }
  };

  init();
</script>
</body>
</html>
