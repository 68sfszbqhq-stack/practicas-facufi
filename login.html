<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso al Sistema – Prácticas Curriculares FCF</title>
  <meta name="description" content="Acceso al portal de Prácticas Curriculares de la Facultad de Cultura Física BUAP. Ingresa como docente o alumno.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
            :root {
      --gold: #00B5E2; --gold-dark: #008cb0; --bg: #F4F7F9;
      --surface: #FFFFFF; --surface2: #Eef2f6; --surface3: #DDE4EB;
      --text: #1a252f; --text-muted: #5e6d7d;
      --radius: 16px; --radius-sm: 10px;
      --green: #2E7D32; --orange: #E65100; --red: #C62828; --blue: #1565C0;
      --buap-navy: #003B5C;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
        .bg-canvas { position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(rgba(244, 247, 249, 0.85), rgba(244, 247, 249, 0.95)), url('bg-fcf.jpg') center/cover no-repeat;
    }
    .bg-canvas::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(0,181,226,0.08) 0%, transparent 70%);
      animation: pulse 8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    /* Floating particles */
    .particle {
      position: fixed;
      width: 2px; height: 2px;
      background: rgba(0,181,226,0.4);
      border-radius: 50%;
      animation: float linear infinite;
    }
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 0.5; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }

    .wrapper {
      position: relative; z-index: 10;
      width: 100%; max-width: 480px;
      padding: 20px;
    }

    /* Header */
    .brand {
      text-align: center;
      margin-bottom: 32px;
      animation: slideDown 0.6s ease both;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      font-size: 32px;
      box-shadow: 0 8px 32px rgba(0,181,226,0.3);
    }
    .brand h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.7em;
      color: var(--gold);
      line-height: 1.2;
    }
    .brand p {
      font-size: 0.8em;
      color: var(--text-muted);
      margin-top: 6px;
      font-weight: 400;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid rgba(0,181,226,0.15);
      border-radius: var(--radius);
      padding: 36px 36px 32px;
      box-shadow: var(--shadow);
      animation: slideUp 0.7s ease both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Role selector */
    .role-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      background: var(--surface2);
      border-radius: var(--radius-sm);
      padding: 6px;
      margin-bottom: 28px;
    }
    .role-tab {
      padding: 10px 8px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.82em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex; align-items: center; justify-content: center;
      gap: 6px;
      letter-spacing: 0.5px;
    }
    .role-tab.active {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: #fff;
      box-shadow: 0 4px 16px rgba(0,181,226,0.25);
    }
    .role-tab:hover:not(.active) {
      background: var(--surface3);
      color: var(--text);
    }

    .section-title {
      font-size: 0.72em;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--gold);
      font-weight: 700;
      margin-bottom: 20px;
    }

    /* Form */
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 0.78em;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 13px 16px;
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.95em;
      transition: all 0.25s ease;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(0,181,226,0.12);
      background: var(--surface3);
    }
    .form-group select option { background: var(--surface2); }

    .hint {
      font-size: 0.72em;
      color: var(--text-muted);
      margin-top: 6px;
      display: flex; align-items: center; gap: 4px;
    }

    /* Password toggle */
    .input-wrap { position: relative; }
    .input-wrap input { padding-right: 44px; }
    .toggle-pwd {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 16px;
      transition: color 0.2s;
    }
    .toggle-pwd:hover { color: var(--gold); }

    /* Submit */
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      border: none;
      border-radius: 50px;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.95em;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
    }
    .btn-submit::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .btn-submit:hover::before { opacity: 1; }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,181,226,0.35); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Error */
    .error-msg {
      background: rgba(255,87,87,0.1);
      border: 1px solid rgba(255,87,87,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82em;
      color: var(--error);
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      animation: shake 0.4s ease;
    }
    .error-msg.show { display: flex; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    /* Footer */
    .card-footer {
      text-align: center;
      margin-top: 22px;
    }
    .card-footer a {
      font-size: 0.8em;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .card-footer a:hover { color: var(--gold); }

    /* Semester 2026 tag */
    .periodo-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.68em;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--gold-dark);
      background: rgba(0,181,226,0.08);
      border: 1px solid rgba(0,181,226,0.2);
      border-radius: 20px;
      padding: 4px 12px;
      margin-bottom: 20px;
    }
    .periodo-tag::before { content: '●'; animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%, 100% { opacity:1 } 50% { opacity:0.3 } }
  </style>
</head>
<body>

<div class="bg-canvas"></div>

<!-- Floating particles -->
<script>
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.width = p.style.height = (Math.random() * 3 + 1) + 'px';
    p.style.animationDuration = (Math.random() * 15 + 10) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    document.body.appendChild(p);
  }
</script>

<div class="wrapper">
  <div class="brand">
    <div class="brand-icon">🏆</div>
    <h1>Prácticas Curriculares</h1>
    <p>Facultad de Cultura Física · BUAP</p>
  </div>

  <div class="card">
    <div style="text-align:center; margin-bottom:20px;">
      <span class="periodo-tag">Primavera 2026</span>
    </div>

    <!-- Role tabs -->
    <div class="role-tabs">
      <button class="role-tab active" id="tab-alumno" onclick="setRole('alumno')">
        🎓 Alumno
      </button>
      <button class="role-tab" id="tab-docente" onclick="setRole('docente')">
        👨‍🏫 Docente
      </button>
    </div>

    <p class="section-title" id="form-title">Acceso para Alumnos</p>

    <form id="login-form" onsubmit="handleLogin(event)">

      <!-- ALUMNO mode: identifier = matrícula -->
      <div id="field-matricula" class="form-group">
        <label for="input-matricula">Matrícula</label>
        <input type="text" id="input-matricula" placeholder="Ej. 202326285"
               autocomplete="username" inputmode="numeric">
        <p class="hint">ℹ️ Tu matrícula es también tu contraseña.</p>
      </div>

      <!-- DOCENTE mode: identifier = nombre/ID -->
      <div id="field-id-docente" class="form-group" style="display:none;">
        <label for="input-id-docente">Número de empleado / NSS</label>
        <input type="text" id="input-id-docente" placeholder="Ej. 100259766 ó NSS014577"
               autocomplete="username">
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="input-password">Contraseña</label>
        <div class="input-wrap">
          <input type="password" id="input-password" placeholder="Ingresa tu contraseña"
                 autocomplete="current-password">
          <button type="button" class="toggle-pwd" onclick="togglePwd()" title="Mostrar/Ocultar">👁</button>
        </div>
        <p class="hint" id="pwd-hint">🔑 Tu contraseña es tu número de matrícula.</p>
      </div>

      <button type="submit" class="btn-submit" id="btn-login">Ingresar al Portal</button>

      <div class="error-msg" id="error-msg">
        ⚠️ <span id="error-text">Datos incorrectos. Verifica tu matrícula o contraseña.</span>
      </div>
    </form>

    <div class="card-footer">
      <a href="index.html">← Regresar al inicio</a>
    </div>
  </div>
</div>

<script src="data.js?v=3"></script>
<script>
  let currentRole = 'alumno';

  function setRole(role) {
    currentRole = role;
    document.getElementById('tab-alumno').classList.toggle('active', role === 'alumno');
    document.getElementById('tab-docente').classList.toggle('active', role === 'docente');

    const showAlumno = role === 'alumno';
    document.getElementById('field-matricula').style.display = showAlumno ? '' : 'none';
    document.getElementById('field-id-docente').style.display = showAlumno ? 'none' : '';
    document.getElementById('form-title').textContent = showAlumno ? 'Acceso para Alumnos' : 'Acceso para Docentes';
    const hintEl = document.getElementById('pwd-hint');
    hintEl.textContent = '🔑 Tu contraseña es tu número de matrícula.';
    hintEl.style.display = showAlumno ? '' : 'none';
    document.getElementById('error-msg').classList.remove('show');
    document.getElementById('input-password').value = '';
  }

  function togglePwd() {
    const inp = document.getElementById('input-password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    btn.textContent = 'Verificando...';
    btn.disabled = true;

    setTimeout(() => {
      const pwd = document.getElementById('input-password').value.trim();

      if (currentRole === 'alumno') {
        const mat = document.getElementById('input-matricula').value.trim();
        const alumno = ALUMNOS.find(a => a.matricula === mat);
        if (alumno && pwd === getPasswordAlumno(alumno)) {
          sessionStorage.setItem('usuario_tipo', 'alumno');
          sessionStorage.setItem('usuario_data', JSON.stringify(alumno));
          window.location.href = 'perfil-alumno.html';
          return;
        } else {
          showError('Matrícula o contraseña incorrecta. Recuerda que tu contraseña es tu matrícula.');
        }
      } else {
        const idDoc = document.getElementById('input-id-docente').value.trim();
        // Agrupar docentes por ID
        const docente = DOCENTES.find(d => d.id === idDoc);
        if (docente && pwd.toUpperCase() === getPasswordDocente(docente)) {
          sessionStorage.setItem('usuario_tipo', 'docente');
          sessionStorage.setItem('usuario_data', JSON.stringify(docente));
          window.location.href = 'perfil-docente.html';
          return;
        } else {
          showError('Número de empleado o contraseña incorrectos. Si no recuerdas tu contraseña contáctanos.');
        }
      }
      btn.textContent = 'Ingresar al Portal';
      btn.disabled = false;
    }, 600);
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    document.getElementById('error-text').textContent = msg;
    el.classList.add('show');
    const btn = document.getElementById('btn-login');
    btn.textContent = 'Ingresar al Portal';
    btn.disabled = false;
  }
</script>
</body>
</html>
