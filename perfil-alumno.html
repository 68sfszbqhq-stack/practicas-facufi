<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil de Alumno – Prácticas Curriculares FCF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
        :root {
      --gold: #00B5E2; --gold-dark: #008cb0; --bg: #03141f;
      --surface: #062131; --surface2: #0b3046; --surface3: #12405a;
      --text: rgba(255,255,255,0.95); --text-muted: rgba(255,255,255,0.65);
      --radius: 16px; --radius-sm: 10px;
      --green: #4CAF7D; --orange: #FFB74D; --red: #EF5350; --blue: #64B5F6;
      --buap-navy: #003B5C;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .bg-canvas { position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 15% 20%, rgba(0,181,226,0.07) 0%, transparent 50%),
                  linear-gradient(135deg, #0a0a0a 0%, #111 100%); }
    .topbar { position: sticky; top: 0; z-index: 100;
      background: rgba(13,13,13,0.85); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0,181,226,0.1);
      padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    .topbar-brand { display: flex; align-items: center; gap:10px; font-weight:700; font-size:.88em; color:var(--gold); }
    .btn-sm { padding:7px 16px; border:1px solid rgba(0,181,226,0.3); border-radius:20px;
      background:transparent; color:var(--text-muted); font-family:'Montserrat',sans-serif;
      font-size:.75em; font-weight:600; cursor:pointer; transition:all .2s; text-decoration:none;
      display:inline-flex; align-items:center; gap:5px; }
    .btn-sm:hover { border-color:var(--gold); color:var(--gold); background:rgba(0,181,226,.05); }
    main { position:relative; z-index:1; max-width:800px; margin:0 auto; padding:32px 20px 60px; }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    /* Hero */
    .hero-card { background:linear-gradient(135deg,rgba(0,181,226,.12),rgba(0,181,226,.04));
      border:1px solid rgba(0,181,226,.2); border-radius:var(--radius);
      padding:28px 28px; display:flex; align-items:center; gap:24px;
      margin-bottom:20px; animation:fadeInUp .5s ease both; }
    .avatar { width:76px; height:76px; background:linear-gradient(135deg,var(--gold),var(--gold-dark));
      border-radius:50%; display:flex; align-items:center; justify-content:center;
      font-size:1.8em; font-weight:800; color:#000; flex-shrink:0;
      box-shadow:0 8px 32px rgba(0,181,226,.3); }
    .hero-info .small-label { font-size:.65em; text-transform:uppercase; letter-spacing:2px; color:var(--gold); font-weight:700; margin-bottom:4px; }
    .hero-info h2 { font-family:'Playfair Display',serif; font-size:1.4em; margin-bottom:8px; }
    .pills { display:flex; flex-wrap:wrap; gap:6px; }
    .pill { padding:4px 12px; border-radius:20px; font-size:.7em; font-weight:600; }
    .pill-gold { background:rgba(0,181,226,.15); color:var(--gold); border:1px solid rgba(0,181,226,.25); }
    .pill-grey { background:var(--surface3); color:var(--text-muted); }
    /* Promedio + ranking */
    .top-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; animation:fadeInUp .5s ease .1s both; }
    .stat-box { background:var(--surface); border:1px solid rgba(255,255,255,.06); border-radius:var(--radius-sm); padding:18px; text-align:center; }
    .stat-box .snum { font-size:2em; font-weight:800; color:var(--gold); }
    .stat-box .slabel { font-size:.65em; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); font-weight:600; margin-top:4px; }
    .stat-box .ssub { font-size:.72em; color:var(--text-muted); margin-top:2px; }
    /* Section cards */
    .section-card { background:var(--surface); border:1px solid rgba(255,255,255,.06); border-radius:var(--radius); padding:22px; margin-bottom:18px; }
    .section-header { display:flex; align-items:center; gap:10px; margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid rgba(255,255,255,.05); }
    .sh-icon { width:34px; height:34px; background:rgba(0,181,226,.1); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:16px; }
    .section-header h3 { font-size:.92em; font-weight:700; }
    /* Status banner */
    .status-banner { border-radius:var(--radius-sm); padding:14px 18px; display:flex; align-items:center; gap:12px; margin-bottom:14px; font-size:.85em; }
    .status-banner.pendiente { background:rgba(255,183,77,.08); border:1px solid rgba(255,183,77,.25); color:var(--orange); }
    .status-banner.confirmada { background:rgba(76,175,125,.08); border:1px solid rgba(76,175,125,.25); color:var(--green); }
    .status-banner.sin-solicitud { background:rgba(100,181,246,.06); border:1px solid rgba(100,181,246,.2); color:var(--blue); }
    .status-banner .sb-icon { font-size:1.5em; flex-shrink:0; }
    /* School selector */
    .school-search { width:100%; padding:11px 14px; background:var(--surface2);
      border:1px solid rgba(255,255,255,.08); border-radius:var(--radius-sm);
      color:var(--text); font-family:'Montserrat',sans-serif; font-size:.88em;
      margin-bottom:12px; transition:all .2s; }
    .school-search:focus { outline:none; border-color:var(--gold); background:var(--surface3); }
    .school-search::placeholder { color:var(--text-muted); }
    .school-list { max-height:280px; overflow-y:auto; border-radius:var(--radius-sm); border:1px solid rgba(255,255,255,.06); }
    .school-list::-webkit-scrollbar { width:4px; }
    .school-list::-webkit-scrollbar-track { background:var(--surface2); }
    .school-list::-webkit-scrollbar-thumb { background:var(--gold-dark); border-radius:2px; }
    .school-item { padding:12px 16px; border-bottom:1px solid rgba(255,255,255,.04);
      cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:12px; }
    .school-item:last-child { border-bottom:none; }
    .school-item:hover { background:rgba(0,181,226,.06); }
    .school-item.selected { background:rgba(0,181,226,.12); border-left:3px solid var(--gold); }
    .school-item.taken { opacity:.45; cursor:not-allowed; }
    .si-num { width:28px; height:28px; background:var(--surface3); border-radius:7px;
      display:flex; align-items:center; justify-content:center; font-size:.72em; font-weight:700; color:var(--text-muted); flex-shrink:0; }
    .school-item.selected .si-num { background:var(--gold); color:#000; }
    .si-info {}
    .si-name { font-size:.85em; font-weight:600; }
    .si-sub { font-size:.72em; color:var(--text-muted); margin-top:2px; }
    .si-tag { margin-left:auto; flex-shrink:0; }
    .tag-taken { background:rgba(239,83,80,.1); color:var(--red); border:1px solid rgba(239,83,80,.2); padding:3px 9px; border-radius:10px; font-size:.65em; font-weight:700; }
    .tag-free { background:rgba(76,175,125,.1); color:var(--green); border:1px solid rgba(76,175,125,.2); padding:3px 9px; border-radius:10px; font-size:.65em; font-weight:700; }
    /* Priority badge */
    .priority-badge { display:inline-flex; align-items:center; gap:6px; padding:6px 14px;
      background:rgba(0,181,226,.1); border:1px solid rgba(0,181,226,.2);
      border-radius:20px; font-size:.78em; font-weight:700; color:var(--gold); margin-bottom:12px; }
    /* Buttons */
    .btn-primary { width:100%; padding:13px; background:linear-gradient(135deg,var(--gold),var(--gold-dark));
      border:none; border-radius:50px; color:#000; font-family:'Montserrat',sans-serif;
      font-size:.92em; font-weight:700; cursor:pointer; transition:all .3s; margin-top:6px; }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,181,226,.3); }
    .btn-primary:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    .btn-danger { width:100%; padding:11px; background:transparent; border:1px solid rgba(239,83,80,.35);
      border-radius:50px; color:var(--red); font-family:'Montserrat',sans-serif;
      font-size:.85em; font-weight:600; cursor:pointer; transition:all .2s; margin-top:8px; }
    .btn-danger:hover { background:rgba(239,83,80,.08); }
    /* PDF upload */
    .upload-zone { border:2px dashed rgba(0,181,226,.25); border-radius:var(--radius-sm);
      padding:28px; text-align:center; cursor:pointer; transition:all .2s; margin-bottom:12px;
      background:rgba(0,181,226,.03); }
    .upload-zone:hover, .upload-zone.dragover { border-color:var(--gold); background:rgba(0,181,226,.08); }
    .upload-zone .uz-icon { font-size:2em; margin-bottom:8px; }
    .upload-zone .uz-title { font-size:.88em; font-weight:600; margin-bottom:4px; }
    .upload-zone .uz-sub { font-size:.72em; color:var(--text-muted); }
    .file-preview { background:var(--surface2); border:1px solid rgba(0,181,226,.2);
      border-radius:var(--radius-sm); padding:14px 16px; display:flex; align-items:center; gap:12px; margin-bottom:12px; }
    .fp-icon { font-size:1.8em; flex-shrink:0; }
    .fp-name { font-size:.85em; font-weight:600; flex:1; word-break:break-all; }
    .fp-size { font-size:.72em; color:var(--text-muted); margin-top:2px; }
    .fp-remove { background:none; border:none; color:var(--red); font-size:1.1em; cursor:pointer; padding:4px; flex-shrink:0; }
    /* Upload progress */
    .progress-bar { height:4px; background:var(--surface3); border-radius:2px; margin-bottom:8px; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-dark)); border-radius:2px; transition:width .4s; }
    /* Info rows */
    .detail-row { display:flex; justify-content:space-between; align-items:center;
      padding:10px 0; border-bottom:1px solid rgba(255,255,255,.04); font-size:.85em; }
    .detail-row:last-child { border-bottom:none; }
    .dr-label { color:var(--text-muted); font-weight:500; }
    .dr-value { font-weight:600; text-align:right; }
    /* Alert */
    .alert { border-radius:var(--radius-sm); padding:12px 16px; font-size:.8em; margin-top:10px; display:none; }
    .alert.show { display:block; }
    .alert.success { background:rgba(76,175,125,.1); border:1px solid rgba(76,175,125,.25); color:var(--green); }
    .alert.error { background:rgba(239,83,80,.1); border:1px solid rgba(239,83,80,.25); color:var(--red); }
    .alert.info { background:rgba(100,181,246,.08); border:1px solid rgba(100,181,246,.2); color:var(--blue); }
    @media(max-width:600px) { .hero-card{flex-direction:column;text-align:center} .pills{justify-content:center} .top-row{grid-template-columns:1fr} }
  </style>
</head>
<body>
<div class="bg-canvas"></div>
<nav class="topbar">
  <div class="topbar-brand"><span>🏆</span> Prácticas Curriculares FCF</div>
  <a href="login.html" class="btn-sm" onclick="sessionStorage.clear()">🚪 Cerrar sesión</a>
</nav>
<main id="main-content">
  <p style="color:var(--text-muted);text-align:center;padding:40px">Cargando...</p>
</main>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, getDocs }
    from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAHhDJQcaDgojC0qRXQeG3M2y55KgtBaog",
    authDomain: "sistema-de-practicas-cfbuap.firebaseapp.com",
    projectId: "sistema-de-practicas-cfbuap",
    storageBucket: "sistema-de-practicas-cfbuap.firebasestorage.app",
    messagingSenderId: "802276056298",
    appId: "1:802276056298:web:9a390b2d13825b66d60b93"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // URL del Google Apps Script para subir PDFs a Drive
  // INSTRUCCIÓN: Reemplaza esto con tu URL de Apps Script después de desplegarlo
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwemSm_MgIpaU1nSGeNaePqAt2p3u0GPAsBDpdkexHNBBg115niukY-Tk31ks_jIgOE1w/exec';

  window._db = db;
  window._APPS_SCRIPT_URL = APPS_SCRIPT_URL;

  // ─── Obtener solicitudes existentes (escuelas tomadas)
  async function getSolicitudes() {
    const snap = await getDocs(collection(db, 'solicitudes_practicas'));
    const map = {};
    snap.forEach(d => { map[d.id] = d.data(); });
    return map;
  }

  // ─── Obtener solicitud del alumno
  async function getMiSolicitud(matricula) {
    const ref = doc(db, 'solicitudes_practicas', matricula);
    const snap = await getDoc(ref);
    return snap.exists() ? snap.data() : null;
  }

  // ─── Guardar solicitud
  async function guardarSolicitud(matricula, data) {
    await setDoc(doc(db, 'solicitudes_practicas', matricula), data);
  }

  // ─── Cancelar solicitud
  async function cancelarSolicitud(matricula) {
    await deleteDoc(doc(db, 'solicitudes_practicas', matricula));
  }

  window._getSolicitudes = getSolicitudes;
  window._getMiSolicitud = getMiSolicitud;
  window._guardarSolicitud = guardarSolicitud;
  window._cancelarSolicitud = cancelarSolicitud;

  // Signal ready
  window._firebaseReady = true;
  document.dispatchEvent(new Event('firebase-ready'));
</script>

<script src="data.js?v=3"></script>
<script>
  let alumnoData = null;
  let solicitudesGlobales = {};
  let miSolicitud = null;
  let selectedSchoolId = null;
  let selectedFile = null;
  let rankGlobal = 0;

  // Esperar Firebase
  function waitFirebase(cb) {
    if (window._firebaseReady) cb();
    else document.addEventListener('firebase-ready', cb, {once: true});
  }

  function init() {
    const tipo = sessionStorage.getItem('usuario_tipo');
    const raw = sessionStorage.getItem('usuario_data');
    if (tipo !== 'alumno' || !raw) { window.location.href = 'login.html'; return; }
    alumnoData = JSON.parse(raw);

    // Calcular ranking global
    const sorted = [...ALUMNOS].sort((a,b) => b.promedio - a.promedio);
    rankGlobal = sorted.findIndex(a => a.matricula === alumnoData.matricula) + 1;

    waitFirebase(async () => {
      solicitudesGlobales = await window._getSolicitudes();
      miSolicitud = await window._getMiSolicitud(alumnoData.matricula);
      renderPerfil();
    });
  }

  function renderPerfil() {
    const nombre = toTitleCase(alumnoData.nombre);
    const initials = getInitials(alumnoData.nombre);
    const badge = getPromedioBadge(alumnoData.promedio);
    const docente = DOCENTES.find(d => d.secciones.some(s => s.nrc === alumnoData.nrc));
    const seccion = docente ? docente.secciones.find(s => s.nrc === alumnoData.nrc) : null;
    const compSec = ALUMNOS.filter(a => a.nrc === alumnoData.nrc);
    const posSec = compSec.sort((a,b)=>b.promedio-a.promedio).findIndex(a=>a.matricula===alumnoData.matricula)+1;

    document.getElementById('main-content').innerHTML = `
      <div class="hero-card">
        <div class="avatar">${initials}</div>
        <div class="hero-info">
          <p class="small-label">🎓 Alumno · Primavera 2026</p>
          <h2>${nombre}</h2>
          <div class="pills">
            <span class="pill pill-gold">📋 ${alumnoData.matricula}</span>
            <span class="pill pill-grey">${alumnoData.plan}</span>
          </div>
        </div>
      </div>

      <div class="top-row">
        <div class="stat-box">
          <div class="snum" style="color:${alumnoData.promedio>=9?'var(--green)':'var(--gold)'}">${alumnoData.promedio.toFixed(2)}</div>
          <div class="slabel">Promedio</div>
          <div class="ssub"><span class="${badge.class}">${badge.label}</span></div>
        </div>
        <div class="stat-box">
          <div class="snum">🥇 #${rankGlobal}</div>
          <div class="slabel">Prioridad global</div>
          <div class="ssub">de ${ALUMNOS.length} alumnos</div>
        </div>
      </div>

      <!-- Datos académicos -->
      <div class="section-card" style="animation:fadeInUp .5s ease .15s both">
        <div class="section-header">
          <div class="sh-icon">📚</div>
          <h3>Datos Académicos</h3>
        </div>
        <div class="detail-row"><span class="dr-label">Materia</span><span class="dr-value">Práct. Educ. Fís. II (NMS) – LEFS 201</span></div>
        <div class="detail-row"><span class="dr-label">Sección / NRC</span><span class="dr-value">Secc. ${seccion?seccion.seccion:'—'} · ${alumnoData.nrc}</span></div>
        <div class="detail-row"><span class="dr-label">Docente</span><span class="dr-value">${docente?toTitleCase(docente.nombre.replace(' - ',' ')):alumnoData.docente}</span></div>
        <div class="detail-row"><span class="dr-label">Horario</span><span class="dr-value">${seccion?getNombreDias(seccion.dias)+' · '+formatHora(seccion.hora):'—'}</span></div>
        <div class="detail-row"><span class="dr-label">Posición en sección</span><span class="dr-value">#${posSec} de ${compSec.length}</span></div>
      </div>

      <!-- Selector de escuela -->
      <div class="section-card" id="school-section" style="animation:fadeInUp .5s ease .25s both">
        <div class="section-header">
          <div class="sh-icon">🏫</div>
          <h3>Centro de Prácticas</h3>
        </div>
        <div id="school-content"></div>
      </div>

      <!-- Documentos -->
      <div class="section-card" id="docs-section" style="animation:fadeInUp .5s ease .35s both">
        <div class="section-header">
          <div class="sh-icon">📄</div>
          <h3>Documentos Requeridos</h3>
        </div>
        <div id="docs-content"></div>
      </div>
    `;

    renderEscuelaSection();
    renderDocsSection();
  }

  function renderEscuelaSection() {
    const el = document.getElementById('school-content');
    if (!el) return;

    if (miSolicitud) {
      const esc = ESCUELAS.find(e => e.id === miSolicitud.escuelaId);
      const isConfirmada = miSolicitud.estado === 'confirmada';
      el.innerHTML = `
        <div class="status-banner ${isConfirmada?'confirmada':'pendiente'}">
          <span class="sb-icon">${isConfirmada?'✅':'⏳'}</span>
          <div>
            <strong>${isConfirmada?'Asignación confirmada por el docente':'Solicitud enviada – pendiente de confirmación'}</strong>
            <div style="font-size:.85em;margin-top:3px;opacity:.8">
              ${isConfirmada?'Tu docente ha confirmado tu escuela de práctica.':'Tu solicitud fue recibida. El docente la revisará próximamente.'}
            </div>
          </div>
        </div>
        <div style="background:var(--surface2);border-radius:var(--radius-sm);padding:16px;margin-bottom:12px">
          <div style="font-size:.68em;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);font-weight:700;margin-bottom:8px">Escuela solicitada</div>
          <div style="font-weight:700;font-size:.95em;margin-bottom:4px">${esc?toTitleCase(esc.nombre):miSolicitud.escuelaNombre} <span style="font-size:.7em;color:var(--gold);border:1px solid var(--gold);padding:2px 6px;border-radius:10px;margin-left:4px;display:${!esc?'inline-block':'none'}">EXTEMPORÁNEO</span></div>
          <div style="font-size:.78em;color:var(--text-muted)">${esc?esc.municipio+' ('+esc.localidad+') · CCT: '+esc.cct:miSolicitud.escuelaMunicipio}</div>
          <div style="font-size:.75em;color:var(--text-muted);margin-top:4px">📍 ${esc?esc.direccion:'Registro no oficial'}</div>
          ${esc ? `<div style="font-size:.72em;color:var(--gold);margin-top:4px"><strong>Zona:</strong> ${esc.zona} | <strong>Tipo:</strong> ${esc.tipo} | <strong>Turno:</strong> ${esc.turno}</div>` : ''}
        </div>
        ${!isConfirmada ? `<button class="btn-danger" onclick="cancelarMiSolicitud()">✕ Cancelar solicitud y elegir otra</button>` : ''}
        <div id="school-alert" class="alert"></div>
      `;
      return;
    }

    
    // Sin solicitud – mostrar selector
    const tomadas = new Set(Object.values(solicitudesGlobales).map(s => s.escuelaId));
    let html = `
      <div class="status-banner sin-solicitud">
        <span class="sb-icon">ℹ️</span>
        <div><strong>Aún no has seleccionado tu escuela</strong>
        <div style="font-size:.85em;margin-top:2px;opacity:.8">Tu prioridad es <strong>#${rankGlobal}</strong> de ${ALUMNOS.length} alumnos. Las escuelas se asignan por orden de promedio.</div></div>
      </div>
      <div class="priority-badge">🏆 Tu turno de elección: #${rankGlobal}</div>
      
      <button onclick="toggleExtemporanea()" id="btn-toggle-ext" class="btn-sm" style="margin-bottom:14px;display:flex;width:100%;justify-content:center;padding:10px;border-color:var(--gold);color:var(--gold);font-size:.82em">
        ⚡ Ya tengo lugar de prácticas asignado
      </button>

      <div id="selector-normal">
        <input type="text" class="school-search" placeholder="🔍 Buscar escuela por nombre o municipio..." id="school-search-inp" oninput="filterSchools()">
        <div class="school-list" id="school-list-el">
    `;
    ESCUELAS.forEach(esc => {
      const isTaken = tomadas.has(esc.id);
      html += `
        <div class="school-item${isTaken?' taken':''}" id="si-${esc.id}" onclick="${isTaken?'':'selectSchool('+esc.id+')'}">
          <div class="si-num">${esc.id}</div>
          <div class="si-info">
            <div class="si-name">${toTitleCase(esc.nombre)}</div>
            <div class="si-sub">${esc.municipio} (${esc.localidad}) · CCT: ${esc.cct}</div>
          </div>
          <div class="si-tag"><span class="${isTaken?'tag-taken':'tag-free'}">${isTaken?'Ocupada':'Disponible'}</span></div>
        </div>`;
    });
    html += `</div>
      <div id="selected-school-preview" style="display:none;margin-top:14px;background:rgba(0,181,226,.08);border:1px solid rgba(0,181,226,.2);border-radius:var(--radius-sm);padding:14px">
        <div style="font-size:.68em;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);font-weight:700;margin-bottom:6px">Escuela seleccionada</div>
        <div id="preview-nombre" style="font-weight:700;font-size:.92em;margin-bottom:3px"></div>
        <div id="preview-sub" style="font-size:.75em;color:var(--text-muted)"></div>
      </div>
      <button class="btn-primary" id="btn-solicitar" onclick="enviarSolicitud()" disabled>Solicitar esta escuela</button>
      </div> <!-- Cierra selector-normal -->

      <div id="selector-extemporaneo" style="display:none;background:rgba(0,181,226,.05);padding:18px;border-radius:var(--radius-sm);border:1px dashed rgba(0,181,226,.4)">
        <h4 style="margin-bottom:6px;color:var(--gold);font-size:.95em">Registro de lugar extemporáneo</h4>
        <p style="font-size:.78em;color:var(--text-muted);margin-bottom:14px;line-height:1.4">Si ya contabas con un lugar asignado desde el inicio del semestre y no necesitas elegir del listado oficial, indícalo aquí.</p>
        <input type="text" id="ext-nombre" class="school-search" placeholder="Nombre completo de la escuela" style="margin-bottom:10px">
        <input type="text" id="ext-muni" class="school-search" placeholder="Municipio o Localidad" style="margin-bottom:14px">
        <button class="btn-primary" onclick="enviarSolicitudExtemporanea()" id="btn-solicitar-ext">Registrar mi lugar de prácticas</button>
      </div>

      <div id="school-alert" class="alert"></div>
    `;
    el.innerHTML = html;
  }

  function filterSchools() {
    const q = document.getElementById('school-search-inp').value.toLowerCase();
    ESCUELAS.forEach(esc => {
      const el = document.getElementById('si-'+esc.id);
      if (!el) return;
      const match = esc.nombre.toLowerCase().includes(q) || esc.municipio.toLowerCase().includes(q);
      el.style.display = match ? '' : 'none';
    });
  }

  function selectSchool(id) {
    selectedSchoolId = id;
    const esc = ESCUELAS.find(e => e.id === id);
    // Update UI
    document.querySelectorAll('.school-item').forEach(el => el.classList.remove('selected'));
    const item = document.getElementById('si-'+id);
    if (item) item.classList.add('selected');
    // Preview
    const preview = document.getElementById('selected-school-preview');
    if (preview) {
      preview.style.display = '';
      document.getElementById('preview-nombre').textContent = toTitleCase(esc.nombre);
      document.getElementById('preview-sub').innerHTML = `
        📍 ${esc.direccion} <br>
        🌎 ${esc.municipio} (${esc.localidad}) <br>
        🏷️ CCT: ${esc.cct} | <strong>Zona:</strong> ${esc.zona} | <strong>Tipo:</strong> ${esc.tipo} <br>
        🕒 <strong>Turno:</strong> ${esc.turno}
      `;
    }
    const btn = document.getElementById('btn-solicitar');
    if (btn) btn.disabled = false;
  }

  async function enviarSolicitud() {
    if (!selectedSchoolId) return;
    const btn = document.getElementById('btn-solicitar');
    btn.textContent = 'Enviando...'; btn.disabled = true;
    try {
      const esc = ESCUELAS.find(e => e.id === selectedSchoolId);
      await window._guardarSolicitud(alumnoData.matricula, {
        matricula: alumnoData.matricula,
        nombre: alumnoData.nombre,
        promedio: alumnoData.promedio,
        nrc: alumnoData.nrc,
        rankGlobal,
        escuelaId: selectedSchoolId,
        escuelaNombre: esc.nombre,
        escuelaCCT: esc.cct,
        escuelaMunicipio: esc.municipio,
        estado: 'pendiente',
        pdfUrl: null,
        fechaSolicitud: new Date().toISOString()
      });
      miSolicitud = await window._getMiSolicitud(alumnoData.matricula);
      solicitudesGlobales = await window._getSolicitudes();
      renderEscuelaSection();
      showAlert('school-alert','success','✅ ¡Solicitud enviada! Tu docente la revisará pronto.');
    } catch(e) {
      btn.textContent='Solicitar esta escuela'; btn.disabled=false;
      showAlert('school-alert','error','Error al enviar la solicitud. Intenta de nuevo.');
    }
  }

  async function cancelarMiSolicitud() {
    if (!confirm('¿Seguro que deseas cancelar tu solicitud y elegir otra escuela?')) return;
    try {
      await window._cancelarSolicitud(alumnoData.matricula);
      miSolicitud = null;
      solicitudesGlobales = await window._getSolicitudes();
      renderEscuelaSection();
    } catch(e) { alert('Error al cancelar. Intenta de nuevo.'); }
  }

  // ─── DOCS SECTION ─────────────────────────────────────
  function renderDocsSection() {
    const el = document.getElementById('docs-content');
    if (!el) return;
    const tienePDF = miSolicitud && miSolicitud.pdfUrl;
    el.innerHTML = `
      <p style="font-size:.82em;color:var(--text-muted);margin-bottom:14px;line-height:1.6">
        Sube un <strong style="color:var(--text)">PDF único (máx. 1 MB)</strong> con todos los documentos firmados requeridos para realizar tus prácticas curriculares.
      </p>
      ${tienePDF ? `
        <div class="status-banner confirmada" style="margin-bottom:12px">
          <span class="sb-icon">📎</span>
          <div><strong>Documento subido correctamente</strong>
          <div style="font-size:.82em;margin-top:3px"><a href="${miSolicitud.pdfUrl}" target="_blank" style="color:var(--green)">Ver PDF en Google Drive →</a></div></div>
        </div>
        <button class="btn-danger" onclick="renderDocsSection()" style="width:auto;padding:8px 20px;font-size:.78em">Reemplazar documento</button>
      ` : `
        <div class="upload-zone" id="upload-zone" onclick="document.getElementById('pdf-input').click()"
             ondragover="event.preventDefault();this.classList.add('dragover')"
             ondragleave="this.classList.remove('dragover')"
             ondrop="handleDrop(event)">
          <div class="uz-icon">📤</div>
          <div class="uz-title">Haz clic o arrastra tu PDF aquí</div>
          <div class="uz-sub">Solo PDF · Máximo 1 MB</div>
        </div>
        <input type="file" id="pdf-input" accept=".pdf" style="display:none" onchange="handleFileSelect(event)">
        <div id="file-preview-wrap"></div>
        <div class="progress-bar" id="upload-progress-bar" style="display:none"><div class="progress-fill" id="upload-fill" style="width:0%"></div></div>
        <button class="btn-primary" id="btn-upload" onclick="subirPDF()" disabled>Subir documentos a Google Drive</button>
        <p style="font-size:.75em;color:var(--gold);margin-top:14px;text-align:center;line-height:1.5">
          ⚠️ <strong>Nota:</strong> El sistema renombrará tu PDF automáticamente bajo el formato institucional:<br>
          <em>APELLIDO-DOCENTE_MATRICULA_NOMBRE-COMPLETO</em>
        </p>
      `}
      <div id="docs-alert" class="alert"></div>
    `;
  }

  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('upload-zone').classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) processFile(file);
  }

  function handleFileSelect(e) {
    const file = e.target.files[0];
    if (file) processFile(file);
  }

  function processFile(file) {
    if (file.type !== 'application/pdf') {
      showAlert('docs-alert','error','⚠️ Solo se aceptan archivos PDF.');
      return;
    }
    if (file.size > 1024 * 1024) {
      showAlert('docs-alert','error','⚠️ El archivo excede 1 MB. Comprime el PDF antes de subirlo.');
      return;
    }
    selectedFile = file;
    const sizeMB = (file.size / 1024 / 1024).toFixed(2);
    const pw = document.getElementById('file-preview-wrap');
    if (pw) pw.innerHTML = `
      <div class="file-preview">
        <span class="fp-icon">📄</span>
        <div>
          <div class="fp-name">${file.name}</div>
          <div class="fp-size">${sizeMB} MB · PDF</div>
        </div>
        <button class="fp-remove" onclick="removeFile()" title="Quitar">✕</button>
      </div>`;
    const btn = document.getElementById('btn-upload');
    if (btn) btn.disabled = false;
  }

  function removeFile() {
    selectedFile = null;
    const pw = document.getElementById('file-preview-wrap');
    if (pw) pw.innerHTML = '';
    const btn = document.getElementById('btn-upload');
    if (btn) btn.disabled = true;
    const inp = document.getElementById('pdf-input');
    if (inp) inp.value = '';
  }

  async function subirPDF() {
    if (!selectedFile) return;
    if (!miSolicitud) {
      showAlert('docs-alert','info','ℹ️ Primero selecciona una escuela y envía tu solicitud.');
      return;
    }

    const btn = document.getElementById('btn-upload');
    btn.textContent = 'Subiendo...'; btn.disabled = true;

    const bar = document.getElementById('upload-progress-bar');
    const fill = document.getElementById('upload-fill');
    if (bar) bar.style.display = '';
    if (fill) fill.style.width = '30%';

    try {
      // Convertir PDF a base64
      const base64 = await fileToBase64(selectedFile);
      if (fill) fill.style.width = '60%';

      // Enviar a Google Apps Script
      const resp = await fetch(window._APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
          matricula: alumnoData.matricula,
          nombre: alumnoData.nombre,
          nrc: alumnoData.nrc,
          fileName: `${(DOCENTES.find(d=>d.secciones.some(s=>s.nrc===alumnoData.nrc))||{}).primerApellido||'DOCENTE'}_${alumnoData.matricula}_${alumnoData.nombre}`.replace(/\s+/g,'_').toUpperCase() + '.pdf',
          fileData: base64
        })
      });
      if (fill) fill.style.width = '85%';
      const result = await resp.json();

      if (result.url) {
        // Guardar URL en Firestore
        await window._guardarSolicitud(alumnoData.matricula, { ...miSolicitud, pdfUrl: result.url, fechaPDF: new Date().toISOString() });
        miSolicitud = await window._getMiSolicitud(alumnoData.matricula);
        if (fill) fill.style.width = '100%';
        setTimeout(() => { renderDocsSection(); showAlert('docs-alert','success','✅ Documento subido correctamente a Google Drive.'); }, 400);
      } else {
        throw new Error(result.error || 'Error desconocido');
      }
    } catch(err) {
      if (bar) bar.style.display = 'none';
      btn.textContent = 'Subir documentos a Google Drive'; btn.disabled = false;
      showAlert('docs-alert','error','❌ Error al subir el PDF. Verifica tu conexión e intenta de nuevo. (' + err.message + ')');
    }
  }

  function fileToBase64(file) {
    return new Promise((res, rej) => {
      const reader = new FileReader();
      reader.onload = () => res(reader.result.split(',')[1]);
      reader.onerror = rej;
      reader.readAsDataURL(file);
    });
  }

  function showAlert(id, type, msg) {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = 'alert show ' + type;
    el.textContent = msg;
    setTimeout(() => el.classList.remove('show'), 6000);
  }

  // Expose globals
  window.selectSchool = selectSchool;
  window.filterSchools = filterSchools;

  let modoExtemporaneo = false;
  function toggleExtemporanea() {
    modoExtemporaneo = !modoExtemporaneo;
    const n = document.getElementById('selector-normal');
    const e = document.getElementById('selector-extemporaneo');
    const b = document.getElementById('btn-toggle-ext');
    if (n && e && b) {
      if (modoExtemporaneo) {
        n.style.display = 'none';
        e.style.display = 'block';
        b.textContent = '◀ Volver a buscar escuela oficial';
      } else {
        n.style.display = 'block';
        e.style.display = 'none';
        b.textContent = '⚡ Ya tengo lugar de prácticas asignado';
      }
    }
  }

  async function enviarSolicitudExtemporanea() {
    const nombreE = document.getElementById('ext-nombre').value.trim();
    const muniE = document.getElementById('ext-muni').value.trim();
    if (!nombreE) {
      showAlert('school-alert', 'error', '⚠️ Escribe el nombre de la escuela.');
      return;
    }
    
    const btn = document.getElementById('btn-solicitar-ext');
    btn.textContent = 'Enviando...'; btn.disabled = true;
    try {
      await window._guardarSolicitud(alumnoData.matricula, {
        matricula: alumnoData.matricula,
        nombre: alumnoData.nombre,
        promedio: alumnoData.promedio,
        nrc: alumnoData.nrc,
        rankGlobal,
        escuelaId: 'EXTEMPORANEA',
        escuelaNombre: nombreE.toUpperCase(),
        escuelaCCT: 'EXTEMPORANEO',
        escuelaMunicipio: muniE.toUpperCase() || 'NO ESPECIFICADO',
        estado: 'pendiente',
        pdfUrl: null,
        fechaSolicitud: new Date().toISOString(),
        esExtemporanea: true
      });
      miSolicitud = await window._getMiSolicitud(alumnoData.matricula);
      solicitudesGlobales = await window._getSolicitudes();
      renderEscuelaSection();
      showAlert('school-alert','success','✅ ¡Lugar extemporáneo registrado! Espera la confirmación del docente.');
    } catch(e) {
      btn.textContent='Registrar mi lugar extemporáneo'; btn.disabled=false;
      showAlert('school-alert','error','Error al registrar. Intenta de nuevo.');
    }
  }

  window.enviarSolicitud = enviarSolicitud;
  window.toggleExtemporanea = toggleExtemporanea;
  window.enviarSolicitudExtemporanea = enviarSolicitudExtemporanea;
  window.cancelarMiSolicitud = cancelarMiSolicitud;
  window.handleDrop = handleDrop;
  window.handleFileSelect = handleFileSelect;
  window.removeFile = removeFile;
  window.subirPDF = subirPDF;
  window.renderDocsSection = renderDocsSection;

  init();
</script>
</body>
</html>
