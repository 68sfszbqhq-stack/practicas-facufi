<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docentes Registrados - Facultad de Cultura Física</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Playfair+Display:wght@700&display=swap');

        :root {
            --color-fondo: #121212;
            --color-dorado-principal: #D4AF37;
            --color-dorado-secundario: #B8860B;
            --color-texto-base: rgba(255, 255, 255, 0.87);
            --fondo-tarjeta: #1E1E1E;
            --fondo-tarjeta-hover: #252525;
            --radio-borde: 12px;
            --color-error: #ff4c4c;
            --color-success: #4caf50;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--color-fondo);
            color: var(--color-texto-base);
            min-height: 100vh;
            overflow-x: hidden;
        }

        #background-animation {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(-45deg, #1a1a1a, #2c2c2c, #121212, #0a0a0a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ===== HEADER ===== */
        header {
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a1a 100%);
            border-bottom: 2px solid var(--color-dorado-principal);
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--color-dorado-principal), var(--color-dorado-secundario));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            color: var(--color-dorado-principal);
            font-size: 1.4em;
        }

        header p {
            font-size: 0.8em;
            opacity: 0.7;
        }

        .back-btn {
            color: var(--color-dorado-principal);
            text-decoration: none;
            font-size: 0.9em;
            padding: 8px 20px;
            border: 1px solid var(--color-dorado-principal);
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: var(--color-dorado-principal);
            color: #121212;
        }

        /* ===== CONTENIDO PRINCIPAL ===== */
        .main-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* ===== ESTADÍSTICAS ===== */
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: var(--fondo-tarjeta);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: var(--radio-borde);
            padding: 20px 25px;
            flex: 1;
            min-width: 150px;
            text-align: center;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            border-color: var(--color-dorado-principal);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
        }

        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 2.2em;
            color: var(--color-dorado-principal);
            line-height: 1;
        }

        .stat-label {
            font-size: 0.8em;
            opacity: 0.7;
            margin-top: 5px;
        }

        /* ===== CONTROLES DE BÚSQUEDA ===== */
        .controles {
            background: var(--fondo-tarjeta);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: var(--radio-borde);
            padding: 20px 25px;
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-wrapper {
            position: relative;
            flex: 1;
            min-width: 200px;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
            font-size: 1em;
        }

        #searchInput {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border-radius: 8px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            background: rgba(0,0,0,0.25);
            color: var(--color-texto-base);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }

        #searchInput:focus {
            outline: none;
            border-color: var(--color-dorado-principal);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
            background: rgba(0,0,0,0.4);
        }

        #searchInput::placeholder { opacity: 0.5; }

        .btn-agregar {
            background: var(--color-dorado-principal);
            color: #121212;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .btn-agregar:hover {
            background: var(--color-dorado-secundario);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        /* ===== TABLA DE DOCENTES ===== */
        .tabla-container {
            background: var(--fondo-tarjeta);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: var(--radio-borde);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            background: rgba(212, 175, 55, 0.1);
            border-bottom: 2px solid rgba(212, 175, 55, 0.3);
            padding: 15px 20px;
            text-align: left;
            font-size: 0.82em;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-dorado-principal);
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        thead th:hover {
            background: rgba(212, 175, 55, 0.15);
        }

        thead th .sort-icon {
            margin-left: 5px;
            opacity: 0.4;
        }

        thead th.sorted .sort-icon { opacity: 1; }

        tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            transition: background 0.2s ease;
        }

        tbody tr:last-child { border-bottom: none; }

        tbody tr:hover {
            background: var(--fondo-tarjeta-hover);
        }

        tbody td {
            padding: 14px 20px;
            font-size: 0.9em;
        }

        .td-id {
            font-family: monospace;
            color: var(--color-dorado-principal);
            opacity: 0.8;
            font-size: 0.85em;
        }

        .td-nombre {
            font-weight: 600;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.78em;
            font-weight: 600;
        }

        .badge-activo {
            background: rgba(76, 175, 80, 0.15);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .badge-inactivo {
            background: rgba(255, 76, 76, 0.1);
            color: #ff4c4c;
            border: 1px solid rgba(255, 76, 76, 0.2);
        }

        .badge-pendiente {
            background: rgba(212, 175, 55, 0.1);
            color: var(--color-dorado-principal);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .btn-accion {
            background: none;
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: var(--color-dorado-principal);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8em;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.2s ease;
        }

        .btn-accion:hover {
            background: var(--color-dorado-principal);
            color: #121212;
        }

        /* ===== ESTADOS ===== */
        .estado-cargando, .estado-vacio, .estado-error {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-top-color: var(--color-dorado-principal);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .estado-cargando p, .estado-vacio p, .estado-error p {
            opacity: 0.6;
            font-size: 0.95em;
        }

        .estado-vacio .icono-vacio, .estado-error .icono-error {
            font-size: 3em;
            margin-bottom: 15px;
        }

        /* ===== MODAL AGREGAR DOCENTE ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: 200;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--fondo-tarjeta);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: var(--radio-borde);
            padding: 35px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(-10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal h2 {
            font-family: 'Playfair Display', serif;
            color: var(--color-dorado-principal);
            font-size: 1.5em;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.85em;
            color: var(--color-dorado-principal);
            margin-bottom: 7px;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 11px 14px;
            border-radius: 8px;
            border: 1px solid rgba(212, 175, 55, 0.25);
            background: rgba(0,0,0,0.25);
            color: var(--color-texto-base);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--color-dorado-principal);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
        }

        .form-group select option {
            background: #1E1E1E;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        .btn-cancelar {
            flex: 1;
            background: none;
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--color-texto-base);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .btn-cancelar:hover { background: rgba(255,255,255,0.05); }

        .btn-guardar {
            flex: 2;
            background: var(--color-dorado-principal);
            border: none;
            color: #121212;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }

        .btn-guardar:hover { background: var(--color-dorado-secundario); }
        .btn-guardar:disabled { opacity: 0.6; cursor: not-allowed; }

        #modal-status {
            margin-top: 12px;
            font-size: 0.85em;
            text-align: center;
        }

        .success { color: var(--color-success); }
        .error { color: var(--color-error); }

        /* ===== TOAST ===== */
        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--fondo-tarjeta);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: var(--color-texto-base);
            padding: 14px 22px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 300;
            font-size: 0.9em;
        }

        #toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* ===== FILA DESTACADA ===== */
        tbody tr.destacado {
            background: rgba(212, 175, 55, 0.08) !important;
            border-left: 3px solid var(--color-dorado-principal);
        }

        @media (max-width: 768px) {
            header { padding: 15px; flex-wrap: wrap; gap: 10px; }
            header h1 { font-size: 1.1em; }
            .controles { flex-direction: column; }
            .stats-bar { gap: 10px; }
            .stat-card { min-width: 120px; }
            table { font-size: 0.85em; }
            .td-id, .td-fecha { display: none; }
        }
    </style>
</head>
<body>

    <div id="background-animation"></div>

    <!-- HEADER -->
    <header>
        <div class="header-left">
            <div class="logo-icon">👨‍🏫</div>
            <div>
                <h1>Docentes Registrados</h1>
                <p>Facultad de Cultura Física · Sistema de Prácticas</p>
            </div>
        </div>
        <a href="index.html" class="back-btn">← Inicio</a>
    </header>

    <!-- CONTENIDO -->
    <div class="main-content">

        <!-- ESTADÍSTICAS -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-number" id="stat-total">—</div>
                <div class="stat-label">Total Docentes</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="stat-activos" style="color:#4caf50">—</div>
                <div class="stat-label">Activos</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="stat-pendientes">—</div>
                <div class="stat-label">Pendientes</div>
            </div>
        </div>

        <!-- CONTROLES -->
        <div class="controles">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Buscar por nombre, ID o área..." autocomplete="off">
            </div>
            <button class="btn-agregar" onclick="abrirModal()">+ Agregar Docente</button>
        </div>

        <!-- TABLA -->
        <div class="tabla-container">
            <div id="contenido-tabla">
                <div class="estado-cargando">
                    <div class="spinner"></div>
                    <p>Cargando docentes desde la base de datos...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL AGREGAR DOCENTE -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2>Agregar Nuevo Docente</h2>
            <div class="form-group">
                <label for="m-id">ID / Número de empleado</label>
                <input type="text" id="m-id" placeholder="Ej. 100378333">
            </div>
            <div class="form-group">
                <label for="m-nombre">Nombre Completo</label>
                <input type="text" id="m-nombre" placeholder="Ej. Jesús Torres Machorro">
            </div>
            <div class="form-group">
                <label for="m-area">Área / Academia</label>
                <select id="m-area">
                    <option value="" disabled selected>Selecciona un área</option>
                    <option value="Educación Física">Educación Física</option>
                    <option value="Entrenamiento Deportivo">Entrenamiento Deportivo</option>
                    <option value="Rehabilitación">Rehabilitación</option>
                    <option value="Gestión Deportiva">Gestión Deportiva</option>
                    <option value="Cultura Física">Cultura Física</option>
                    <option value="Otra">Otra</option>
                </select>
            </div>
            <div class="form-group">
                <label for="m-email">Correo Institucional</label>
                <input type="email" id="m-email" placeholder="Ej. jtorres@buap.mx">
            </div>
            <div class="form-group">
                <label for="m-status">Estado</label>
                <select id="m-status">
                    <option value="Activo">Activo</option>
                    <option value="Inactivo">Inactivo</option>
                    <option value="Pendiente">Pendiente</option>
                </select>
            </div>
            <div id="modal-status"></div>
            <div class="modal-buttons">
                <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
                <button class="btn-guardar" id="btn-guardar-modal" onclick="guardarDocente()">Guardar Docente</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast"></div>

    <!-- FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAHhDJQcaDgojC0qRXQeG3M2y55KgtBaog",
            authDomain: "sistema-de-practicas-cfbuap.firebaseapp.com",
            projectId: "sistema-de-practicas-cfbuap",
            storageBucket: "sistema-de-practicas-cfbuap.firebasestorage.app",
            messagingSenderId: "802276056298",
            appId: "1:802276056298:web:9a390b2d13825b66d60b93"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let todosDocentes = [];
        let sortCol = 'nombre';
        let sortAsc = true;

        // ===== CARGAR DOCENTES =====
        async function cargarDocentes() {
            try {
                const q = query(collection(db, "docentes"), orderBy("nombre"));
                const snapshot = await getDocs(q);

                if (snapshot.empty) {
                    // Si no hay docentes, mostrar estado vacío con opción de agregar
                    mostrarVacio();
                    actualizarStats([], []);
                    return;
                }

                todosDocentes = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderTabla(todosDocentes);
                actualizarStats(todosDocentes, snapshot.docs);

                // Buscar si hay parámetro de búsqueda en la URL
                const params = new URLSearchParams(window.location.search);
                const buscar = params.get('buscar');
                if (buscar) {
                    document.getElementById('searchInput').value = buscar;
                    filtrar(buscar);
                }

            } catch (error) {
                console.error("Error cargando docentes:", error);
                mostrarError(error.message);
            }
        }

        // ===== RENDERIZAR TABLA =====
        function renderTabla(docentes) {
            const contenedor = document.getElementById('contenido-tabla');

            if (docentes.length === 0) {
                contenedor.innerHTML = `
                    <div class="estado-vacio">
                        <div class="icono-vacio">🔍</div>
                        <p>No se encontraron docentes con esa búsqueda.</p>
                    </div>`;
                return;
            }

            // Ordenar
            const sorted = [...docentes].sort((a, b) => {
                const va = (a[sortCol] || '').toString().toLowerCase();
                const vb = (b[sortCol] || '').toString().toLowerCase();
                return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
            });

            const badgeClass = s => s === 'Activo' ? 'badge-activo' : s === 'Inactivo' ? 'badge-inactivo' : 'badge-pendiente';
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            const filas = sorted.map(d => {
                const esDestacado = searchTerm && (
                    (d.empleado_id || '').toLowerCase() === searchTerm ||
                    (d.nombre || '').toLowerCase().includes(searchTerm)
                );
                const fecha = d.fecha_registro
                    ? new Date(d.fecha_registro).toLocaleDateString('es-MX', { day:'2-digit', month:'short', year:'numeric' })
                    : '—';
                return `
                    <tr class="${esDestacado ? 'destacado' : ''}">
                        <td class="td-id">${d.empleado_id || '—'}</td>
                        <td class="td-nombre">${d.nombre || '—'}</td>
                        <td>${d.area || '—'}</td>
                        <td>${d.email || '—'}</td>
                        <td><span class="badge ${badgeClass(d.status || 'Pendiente')}">${d.status || 'Pendiente'}</span></td>
                        <td class="td-fecha">${fecha}</td>
                        <td><button class="btn-accion" onclick="verDetalle('${d.id}')">Ver</button></td>
                    </tr>`;
            }).join('');

            contenedor.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th class="${sortCol==='empleado_id'?'sorted':''}" onclick="cambiarOrden('empleado_id')">
                                ID <span class="sort-icon">${sortCol==='empleado_id'?(sortAsc?'↑':'↓'):'↕'}</span>
                            </th>
                            <th class="${sortCol==='nombre'?'sorted':''}" onclick="cambiarOrden('nombre')">
                                Nombre <span class="sort-icon">${sortCol==='nombre'?(sortAsc?'↑':'↓'):'↕'}</span>
                            </th>
                            <th>Área</th>
                            <th>Correo</th>
                            <th>Estado</th>
                            <th class="td-fecha">Registro</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>${filas}</tbody>
                </table>`;
        }

        function mostrarVacio() {
            document.getElementById('contenido-tabla').innerHTML = `
                <div class="estado-vacio">
                    <div class="icono-vacio">📋</div>
                    <p>Aún no hay docentes registrados en el sistema.</p>
                    <p style="margin-top:10px">Usa el botón <strong style="color:var(--color-dorado-principal)">+ Agregar Docente</strong> para comenzar.</p>
                </div>`;
        }

        function mostrarError(msg) {
            document.getElementById('contenido-tabla').innerHTML = `
                <div class="estado-error">
                    <div class="icono-error">⚠️</div>
                    <p>Error al conectar con la base de datos.</p>
                    <p style="margin-top:8px;font-size:0.8em;opacity:0.5;">${msg}</p>
                </div>`;
        }

        function actualizarStats(docs, rawDocs) {
            document.getElementById('stat-total').textContent = docs.length;
            document.getElementById('stat-activos').textContent = docs.filter(d => d.status === 'Activo').length;
            document.getElementById('stat-pendientes').textContent = docs.filter(d => !d.status || d.status === 'Pendiente').length;
        }

        // ===== FILTRO =====
        function filtrar(term) {
            const t = term.toLowerCase();
            const filtrados = todosDocentes.filter(d =>
                (d.nombre || '').toLowerCase().includes(t) ||
                (d.empleado_id || '').toLowerCase().includes(t) ||
                (d.area || '').toLowerCase().includes(t) ||
                (d.email || '').toLowerCase().includes(t)
            );
            renderTabla(filtrados);
        }

        document.getElementById('searchInput').addEventListener('input', e => {
            filtrar(e.target.value);
        });

        // ===== ORDENAR =====
        window.cambiarOrden = (col) => {
            if (sortCol === col) sortAsc = !sortAsc;
            else { sortCol = col; sortAsc = true; }
            renderTabla(todosDocentes);
        };

        // ===== VER DETALLE =====
        window.verDetalle = (id) => {
            const d = todosDocentes.find(x => x.id === id);
            if (d) mostrarToast(`👤 ${d.nombre} · ID: ${d.empleado_id || 'N/A'} · ${d.area || ''}`);
        };

        // ===== MODAL =====
        window.abrirModal = () => {
            document.getElementById('modal-overlay').classList.add('active');
            document.getElementById('modal-status').textContent = '';
        };

        window.cerrarModal = () => {
            document.getElementById('modal-overlay').classList.remove('active');
            document.getElementById('m-id').value = '';
            document.getElementById('m-nombre').value = '';
            document.getElementById('m-email').value = '';
            document.getElementById('m-area').value = '';
            document.getElementById('m-status').value = 'Activo';
        };

        window.guardarDocente = async () => {
            const id = document.getElementById('m-id').value.trim();
            const nombre = document.getElementById('m-nombre').value.trim();
            const area = document.getElementById('m-area').value;
            const email = document.getElementById('m-email').value.trim();
            const status = document.getElementById('m-status').value;
            const statusEl = document.getElementById('modal-status');
            const btn = document.getElementById('btn-guardar-modal');

            if (!nombre) {
                statusEl.textContent = '⚠️ El nombre es obligatorio.';
                statusEl.className = 'error';
                return;
            }

            btn.textContent = 'Guardando...';
            btn.disabled = true;

            try {
                await addDoc(collection(db, "docentes"), {
                    empleado_id: id,
                    nombre,
                    area,
                    email,
                    status,
                    fecha_registro: new Date().toISOString()
                });
                statusEl.textContent = '✅ Docente guardado correctamente.';
                statusEl.className = 'success';
                setTimeout(() => {
                    cerrarModal();
                    cargarDocentes();
                    mostrarToast('✅ Docente agregado exitosamente');
                }, 1200);
            } catch (error) {
                statusEl.textContent = `❌ Error: ${error.message}`;
                statusEl.className = 'error';
            } finally {
                btn.textContent = 'Guardar Docente';
                btn.disabled = false;
            }
        };

        // ===== TOAST =====
        function mostrarToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }
        window.mostrarToast = mostrarToast;

        // Cerrar modal al hacer clic fuera
        document.getElementById('modal-overlay').addEventListener('click', e => {
            if (e.target === document.getElementById('modal-overlay')) cerrarModal();
        });

        // ===== INICIAR =====
        cargarDocentes();
    </script>

</body>
</html>
